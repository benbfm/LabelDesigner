    # SAVE TEMPLATE — Patch to SharePoint, refresh colTemplates
    - Btn_Save:
        Control: Button@0.0.45
        Properties:
          BasePaletteColor: =RGBA(255, 185, 0, 1)
          AccessibleLabel: =If(gblLang="EN","Save template","保存模板")
          BorderStyle: =BorderStyle.None
          Font: =Font.'Segoe UI'
          FontWeight: =FontWeight.SemiBold
          Height: =34
          OnSelect: |
            =Set(gblSaveJSON, JSON(Sort(colElements, seq, SortOrder.Ascending)));
            If(IsBlank(gblCurrentTplId),
              Set(gblCurrentTplId,
                Patch(ZPL_LabelTemplates, Defaults(ZPL_LabelTemplates),
                  {Title: gblTemplateName, LabelWidth: gblLabelWidth,
                   LabelHeight: gblLabelHeight, ElementsJSON: gblSaveJSON,
                   CreatedByEmail: User().Email}).ID),
              Patch(ZPL_LabelTemplates,
                LookUp(ZPL_LabelTemplates, ID = gblCurrentTplId),
                {Title: gblTemplateName, LabelWidth: gblLabelWidth,
                 LabelHeight: gblLabelHeight, ElementsJSON: gblSaveJSON})
            );
            ClearCollect(colTemplates, ZPL_LabelTemplates);
            Set(gblMsg, {type: "success", text: If(gblLang="EN","Template saved!","模板已保存！")})
          Text: =If(gblLang="EN","Save Template","保存模板")
          Width: =150
          X: =Parent.Width - 320
          Y: =55


          Height: =36
          OnSelect: =Set(gblShowImportModal, false)
          Text: =If(gblLang="EN","Cancel","取消")
          Visible: =gblShowImportModal
          Width: =100
          X: =(Parent.Width - 660) / 2 + 18
          Y: =(Parent.Height - 460) / 2 + 406

    # Parse & Import button — contains full ZPL parsing logic
    - Btn_ParseImport_D:
        Control: Button@0.0.45
        Properties:
          BasePaletteColor: =RGBA(255, 185, 0, 1)
          AccessibleLabel: =If(gblLang="EN","Parse and import ZPL","解析并导入 ZPL")
          BorderStyle: =BorderStyle.None
          Font: =Font.'Segoe UI'
          FontWeight: =FontWeight.SemiBold
          Height: =36
          OnSelect: |
            =Set(gblShowImportModal, false);
            Set(gblImportZPL, TxtIn_ImportZPL_D.Text);

            // ── Extract ^PW (label width in dots) ─────────────────────────
            If(Find("^PW", gblImportZPL) > 0,
              With({s: Mid(gblImportZPL, Find("^PW", gblImportZPL) + 3, 8)},
                With({endPos: If(Find(Char(10), s) > 0 &&
                                 (Find("^", s) <= 0 || Find(Char(10), s) < Find("^", s)),
                               Find(Char(10), s) - 1,
                               If(Find("^", s) > 0, Find("^", s) - 1, Len(s)))},
                  If(IsNumeric(Left(s, endPos)),
                    Set(gblLabelWidth, Value(Left(s, endPos))))
                )
              )
            );

            // ── Extract ^LL (label height in dots) ────────────────────────
            If(Find("^LL", gblImportZPL) > 0,
              With({s: Mid(gblImportZPL, Find("^LL", gblImportZPL) + 3, 8)},
                With({endPos: If(Find(Char(10), s) > 0 &&
                                 (Find("^", s) <= 0 || Find(Char(10), s) < Find("^", s)),
                               Find(Char(10), s) - 1,
                               If(Find("^", s) > 0, Find("^", s) - 1, Len(s)))},
                  If(IsNumeric(Left(s, endPos)),
                    Set(gblLabelHeight, Value(Left(s, endPos))))
                )
              )
            );

            Set(gblScale, If(gblLabelWidth > 0 && gblLabelHeight > 0, Min(820 / gblLabelWidth, 420 / gblLabelHeight), 1));
            Set(gblSelectedElem, First(Filter(colElements, false)));
            Set(gblCurrentTplId, Blank());

            // ── Parse elements via nested AddColumns pipeline ─────────────
            // Split by ^FO; element segments start with digit (x coordinate).
            // Stage 1 (inner) → Stage 2 → Stage 3 → Stage 4 (outer).
            // Each outer stage can reference columns added by inner stages.
            // ── Step 0: extract segments into colSegs with unambiguous 'seg' column ──
            // ForAll(Sequence(N), {seg: Index(split, Value).Value}) mirrors the
            // First(Split(...)).Value record-property pattern — no Value() conflict.
            ClearCollect(colSegs,
              ForAll(
                Sequence(CountRows(Split(gblImportZPL, "^FO"))),
                {seg: Index(Split(gblImportZPL, "^FO"), Value).Value}
              )
            );

            // ── Step 1-4: ForAll + nested With() — avoids AddColumns reserved-word
            //   conflicts ("type") and argument-count limits. With() bindings are
            //   local variables per row; inner With can see outer With bindings.
            ClearCollect(colElements,
              ForAll(
                Filter(colSegs, Len(seg) > 3 && IsNumeric(Left(Trim(seg), 1))),
                With(
                  { // Stage 1 — locate ZPL command positions within the segment
                    tp:  If(Find("^BC",seg)>0,"CODE128",
                         If(Find("^BQ",seg)>0,"QRCODE",
                         If(Find("^BE",seg)>0,"EAN13",
                         If(Find("^BU",seg)>0,"UPCA",
                         If(Find("^GB",seg)>0,"BOX","TEXT"))))),
                    c1p: Find(",",    seg),
                    hnl: If(Find(Char(10),seg)>0, Find(Char(10),seg), Len(seg)+1),
                    fdp: Find("^FD", seg),
                    fsp: Find("^FS", seg),
                    ap:  Find("^A0", seg),
                    bcp: Find("^BC", seg),
                    bep: Find("^BE", seg),
                    bup: Find("^BU", seg),
                    gbp: Find("^GB", seg),
                    bqp: Find("^BQ", seg),
                    fbp: Find("^FB", seg)
                  },
                  With(
                    { // Stage 2 — extract coordinate and parameter substrings
                      x:   Value(Left(seg, c1p - 1)),
                      yRw: Mid(seg, c1p + 1, hnl - c1p - 1),
                      fdc: If(fdp>0 && fsp>0, Mid(seg, fdp+3, fsp-fdp-3), ""),
                      aSt: If(ap>0,  Mid(seg, ap+3,  20), "N,30,30"),
                      bSt: If(bcp>0, Mid(seg, bcp+3, 20),
                             If(bep>0, Mid(seg, bep+3, 20),
                             If(bup>0, Mid(seg, bup+3, 20), "N,60,Y,N,N"))),
                      gSt: If(gbp>0, Mid(seg, gbp+3, 30), "100,50,3,B,0"),
                      qSt: If(bqp>0, Mid(seg, bqp+3, 20), "N,2,4"),
                      fbW: If(fbp>0,
                             With({fbRaw: Mid(seg, fbp+3, 10)},
                               If(Find(",",fbRaw)>0,
                                  Left(fbRaw, Find(",",fbRaw)-1),
                                  fbRaw)), "0")
                    },
                    With(
                      { // Stage 3 — parse comma-separated parameter tokens
                        y:   Value(If(Find("^",yRw)>0, Left(yRw,Find("^",yRw)-1), yRw)),
                        aK1: Find(",", aSt),
                        aK2: Find(",", aSt, Find(",",aSt)+1),
                        bK1: Find(",", bSt),
                        bK2: Find(",", bSt, Find(",",bSt)+1),
                        gK1: Find(",", gSt),
                        gK2: Find(",", gSt, Find(",",gSt)+1),
                        gK3: Find(",", gSt, Find(",",gSt, Find(",",gSt)+1)+1),
                        qK2: Find(",", qSt, 3)
                      },
                      // Stage 3.5 — pre-compute font dims so Stage 4 width can reference fontW_c
                      With(
                        {
                          content_c: If(Left(fdc,3)="QA,", Mid(fdc,4), fdc),
                          fontH_c:   If(tp="TEXT"&&aK1>0&&aK2>0,
                                       Value(Mid(aSt,aK1+1,aK2-aK1-1)), 30),
                          fontW_c:   If(tp="TEXT"&&aK2>0,
                                       // Take 6 chars after aK2, trim at first ^ (next ZPL cmd)
                                       // e.g. aSt="N,50,50^FD..." → substr="50^FD." → trim→"50"
                                       With({fw: Mid(aSt, aK2+1, 6)},
                                         Value(If(Find("^",fw)>0, Left(fw,Find("^",fw)-1),
                                               If(Find(Char(10),fw)>0, Left(fw,Find(Char(10),fw)-1),
                                                  fw)))), 30)
                        },
                        { // Stage 4 — output record matching colElements schema
                          id:            "i" & Text(x) & "y" & Text(y),
                          type:          tp,
                          x:             x,
                          y:             y,
                          // TEXT width: ^FB explicit > fontW×chars estimate > 200 default
                          width:         Switch(tp,
                                           "BOX",    If(gK1>0, Value(Left(gSt,gK1-1)), 100),
                                           "QRCODE", 80,
                                           "TEXT",   If(Value(fbW)>0, Value(fbW),
                                                       Max(60, Len(content_c) * fontW_c + 20)),
                                           200),
                          height:        Switch(tp,
                                           "TEXT",   fontH_c,
                                           "BOX",    If(gK1>0&&gK2>0, Value(Mid(gSt,gK1+1,gK2-gK1-1)), 50),
                                           "QRCODE", 80,
                                           If(bK1>0&&bK2>0, Value(Mid(bSt,bK1+1,bK2-bK1-1)), 60)),
                          orientation:   If(tp="TEXT", If(aK1>0, Left(aSt,1), "N"),
                                           If(tp="BOX", "N",
                                           If(bK1>0, Left(bSt,1), "N"))),
                          content:       content_c,
                          fontH:         fontH_c,
                          fontW:         fontW_c,
                          thickness:     If(tp="BOX"&&gK2>0&&gK3>0,
                                           Value(Mid(gSt,gK2+1,gK3-gK2-1)), 3),
                          magnification: If(tp="QRCODE"&&qK2>0,
                                           Value(Mid(qSt,qK2+1,2)), 4),
                          isVariable:    false,
                          variableName:  "",
                          seq:           0,
                          showValue:     If(tp="CODE128"||tp="EAN13"||tp="UPCA",
                                           If(bK2>0, Upper(Trim(Mid(bSt, bK2+1, 1)))="Y", true),
                                           false)
                        }
                      )
                    )
                  )
                )
              )
            );
            // Assign sequential seq values (1, 2, 3...) to imported elements
            ForAll(Sequence(CountRows(colElements)),
              Patch(colElements, Index(colElements, Value), {seq: Value}));
            Set(gblNextElemId, CountRows(colElements) + 1);
            // Auto-select the first imported element so the properties panel
            // opens immediately — same UX as adding a new element.
            Set(gblSelectedElem, First(colElements));
            Set(gblMsg, {type: "success", text: If(gblLang="EN",
              "Imported " & Text(CountRows(colElements)) & " element(s) from ZPL",
              "已从 ZPL 导入 " & Text(CountRows(colElements)) & " 个元素")})

          Text: =If(gblLang="EN","Parse & Import →","解析并导入 →")
          Visible: =gblShowImportModal
          Width: =200
          X: =(Parent.Width - 660) / 2 + 442
          Y: =(Parent.Height - 460) / 2 + 406



    # Center: HtmlText canvas — reads named formula CanvasHTML
    - Html_Canvas:
        Control: HtmlViewer@2.1.0
        Properties:
          # NOTE: The HTML comment "<!--N-->" appended to CanvasHTML is intentional.
          # Power Apps named formulas cache their result until a dependency changes.
          # ClearCollect+ForAll creates a new table object — the named formula does not
          # reliably detect this as a dependency change and may serve a stale result.
          # Patch() mutates colElements in-place, which properly marks it dirty and
          # triggers CanvasHTML to recalculate. gblSeqTick is incremented by ▲/▼ so
          # the appended comment string changes, forcing HtmlViewer to re-render.
          HtmlText: =CanvasHTML & "<!--" & Text(gblSeqTick) & "-->"
          Height: =(Parent.Height - 100) / 2
          Width: =Parent.Width - 222 - 262
          X: =222
          Y: =100


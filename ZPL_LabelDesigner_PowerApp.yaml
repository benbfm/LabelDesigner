        # EDIT — load template into Designer
        - Btn_TEdit:
            Control: Button@0.0.45
            Properties:
              BasePaletteColor: =RGBA(255, 185, 0, 1)
              AccessibleLabel: =If(gblLang="EN","Edit this template","编辑此模板")
              BorderColor: =RGBA(230,175,50,1)
              BorderStyle: =BorderStyle.Solid
              BorderThickness: =1
              Font: =Font.'Segoe UI'
              Height: =30
              OnSelect: |
                =// FIX 1: Table(ParseJSON(...)) wraps each JSON object in a "Value" column →
                //         field access must be ThisRecord.Value.xxx, NOT ThisRecord.xxx.
                //         Original code used ForAll(Table(...), ThisRecord.xxx) → all fields blank.
                // FIX 2: Numeric fields need Value(Text(ThisRecord.Value.xxx)) — ParseJSON returns
                //         UntypedObject; Value(UntypedObject) throws "invalid arguments";
                //         Text() first converts UntypedObject → string, then Value() → number.
                ClearCollect(colElements,
                  ForAll(Table(ParseJSON(ThisItem.ElementsJSON)),
                    {id: Text(ThisRecord.Value.id), type: Text(ThisRecord.Value.type),
                     x: Value(Text(ThisRecord.Value.x)), y: Value(Text(ThisRecord.Value.y)),
                     width: Value(Text(ThisRecord.Value.width)), height: Value(Text(ThisRecord.Value.height)),
                     orientation: Text(ThisRecord.Value.orientation),
                     content: Text(ThisRecord.Value.content),
                     isVariable: Boolean(ThisRecord.Value.isVariable),
                     variableName: Text(ThisRecord.Value.variableName),
                     fontH: Value(Text(ThisRecord.Value.fontH)), fontW: Value(Text(ThisRecord.Value.fontW)),
                     thickness: Value(Text(ThisRecord.Value.thickness)),
                     magnification: Value(Text(ThisRecord.Value.magnification)),
                     showValue: Boolean(ThisRecord.Value.showValue),
                     seq: 0}));
                ForAll(Sequence(CountRows(colElements)),
                  Patch(colElements, Index(colElements, Value), {seq: Value}));
                Set(gblCurrentTplId, ThisItem.ID);
                Set(gblTemplateName, ThisItem.Title);
                Set(gblLabelWidth, ThisItem.LabelWidth);
                Set(gblLabelHeight, ThisItem.LabelHeight);
                Set(gblScale, If(ThisItem.LabelWidth > 0 && ThisItem.LabelHeight > 0, Min(820 / ThisItem.LabelWidth, 420 / ThisItem.LabelHeight), 1));
                Set(gblSelectedElem, First(Filter(colElements, false)));
                Navigate(DesignerScreen, ScreenTransition.Fade)
              Text: =If(gblLang="EN","Edit","编辑")
              Width: =58
              X: =4
              Y: =160


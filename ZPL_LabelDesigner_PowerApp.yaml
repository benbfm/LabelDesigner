    # ── Help content — one HtmlViewer per tab (Visible toggled by locHelpTab) ─
    - Html_Help_Overview:
        Control: HtmlViewer@2.1.0
        Properties:
          Visible: =locHelpTab = "overview"
          HtmlText: |
            ="<!DOCTYPE html><html><head><style>" &
            "body{font-family:'Segoe UI',Arial,sans-serif;padding:20px 28px;background:#f3f5fc;color:#1a1e3a;margin:0;}" &
            ".hero{background:linear-gradient(135deg,#141626,#2a3060);border-radius:10px;padding:20px 24px;color:#fff;margin-bottom:18px;}" &
            ".hero h1{font-size:18px;font-weight:700;margin:0 0 6px;}" &
            ".hero p{font-size:13px;color:#c0c8e8;line-height:1.6;margin:0;}" &
            ".flow{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin:0 0 18px;padding:12px 14px;background:#f0f4ff;border-radius:8px;border:1px solid #d0d8f0;}" &
            ".fs{padding:5px 12px;border-radius:14px;font-size:12px;font-weight:700;}" &
            ".fa{color:#888;font-size:14px;}" &
            ".sh{font-size:13.5px;font-weight:700;color:#141626;margin:18px 0 8px;border-left:4px solid #FFB900;padding-left:10px;}" &
            ".step{background:#fff;border:1px solid #d0d8f0;border-radius:8px;padding:12px 14px;display:flex;gap:12px;align-items:flex-start;margin-bottom:8px;}" &
            ".num{background:#FFB900;color:#141626;font-weight:800;font-size:11px;min-width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}" &
            ".body{font-size:13px;line-height:1.5;}" &
            ".det{font-size:11.5px;color:#4a5580;margin-top:5px;background:#f0f4ff;padding:5px 8px;border-radius:4px;}" &
            "table{width:100%;border-collapse:collapse;font-size:12.5px;margin-bottom:16px;}" &
            "th{background:#141626;color:#fff;padding:7px 10px;text-align:left;font-size:11.5px;}" &
            "td{padding:7px 10px;border-bottom:1px solid #d0d8f0;vertical-align:top;}" &
            "tr:nth-child(even) td{background:#f0f4ff;}" &
            ".tag{display:inline-block;padding:2px 7px;border-radius:10px;font-size:11px;font-weight:600;}" &
            ".amber{background:#fff3cc;color:#7a4f00;}.blue{background:#e0e8ff;color:#2a3a99;}" &
            ".green{background:#e0f5e9;color:#1a6b3a;}.red{background:#ffe0e0;color:#8b1a1a;}" &
            ".info{background:#eef4ff;border-left:4px solid #3B5BDB;border-radius:6px;padding:10px 13px;font-size:12px;line-height:1.6;margin:12px 0;}" &
            ".tip{background:#fffbea;border-left:4px solid #FFB900;border-radius:6px;padding:10px 13px;font-size:12px;line-height:1.6;margin:12px 0;}" &
            "</style></head><body>" &
            "<div class='hero'><h1>ZPL Label Designer</h1>" &
            If(gblLang="EN",
              "<p>Design, save, and print ZPL barcode labels for Zebra printers. This guide covers everything — from first-time setup to daily printing.</p>",
              "<p>为斑马打印机设计、保存并打印 ZPL 条码标签。本指南涵盖从初次配置到日常打印的全部操作。</p>") &
            "</div>" &
            "<div class='flow'>" &
            "<span class='fs amber'>✏️ " & If(gblLang="EN","Design","设计") & "</span><span class='fa'>→</span>" &
            "<span class='fs blue'>💾 " & If(gblLang="EN","Save Template","保存模板") & "</span><span class='fa'>→</span>" &
            "<span class='fs green'>🖨️ " & If(gblLang="EN","Print","打印") & "</span><span class='fa'>→</span>" &
            "<span class='fs red'>📷 " & If(gblLang="EN","Scan & Repeat","扫描重复") & "</span>" &
            "</div>" &
            "<div class='sh'>🚀 " & If(gblLang="EN","First-Time Setup (do once)","初次配置（仅需一次）") & "</div>" &
            "<div class='step'><div class='num'>1</div><div class='body'>" &
            If(gblLang="EN","<b>Design your label</b> — Go to ✏️ Designer, set the label size, add text, barcodes, and boxes to build the layout.",
                            "<b>设计标签</b> — 前往 ✏️ 设计器，设置标签尺寸，添加文本、条码和方框，构建标签布局。") &
            "<div class='det'>" & If(gblLang="EN","Tip: mark fields that change each print (like order number) as Variables — fill them in at print time.",
                                                  "提示：将每次打印都会改变的字段（如订单号）设为变量，打印时逐次填写。") & "</div></div></div>" &
            "<div class='step'><div class='num'>2</div><div class='body'>" &
            If(gblLang="EN","<b>Save the template</b> — Enter a name and click 💾 Save Template. Your design is stored and available on the 📂 Templates screen.",
                            "<b>保存模板</b> — 输入名称后点击 💾 保存模板，设计将保存并可在 📂 模板库界面查看。") &
            "</div></div>" &
            "<div class='step'><div class='num'>3</div><div class='body'>" &
            If(gblLang="EN","<b>Set your printer URL</b> — Go to 🖨️ Print and enter the Zebra printer address in the Printer URL field, e.g. http://192.168.1.100:9100",
                            "<b>配置打印机地址</b> — 前往 🖨️ 打印，在打印机地址字段输入斑马打印机的网络地址，例如 http://192.168.1.100:9100") &
            "<div class='det'>" & If(gblLang="EN","The URL is saved automatically — you only need to enter it once.","地址会自动保存，只需输入一次。") & "</div></div></div>" &
            "<div class='sh'>📅 " & If(gblLang="EN","Daily Workflow","日常工作流程") & "</div>" &
            "<div class='step'><div class='num'>A</div><div class='body'>" &
            If(gblLang="EN","<b>Quick print:</b> 🖨️ Print → select template → fill variables → Generate ZPL → Send to Printer.",
                            "<b>快速打印：</b> 🖨️ 打印 → 选择模板 → 填写变量 → 生成 ZPL → 发送到打印机。") &
            "</div></div>" &
            "<div class='step'><div class='num'>B</div><div class='body'>" &
            If(gblLang="EN","<b>Scan-to-print:</b> 📷 Scan & Print → scan order barcode → app auto-fills template → Proceed to Print.",
                            "<b>扫描打印：</b> 📷 扫描打印 → 扫描订单条码 → 应用自动填充模板 → 前往打印。") &
            "</div></div>" &
            "<div class='sh'>📋 " & If(gblLang="EN","Screen Guide","界面说明") & "</div>" &
            "<table><thead><tr>" &
            "<th>" & If(gblLang="EN","Screen","界面") & "</th>" &
            "<th>" & If(gblLang="EN","What you can do","可以做什么") & "</th>" &
            "<th>" & If(gblLang="EN","When to use","何时使用") & "</th></tr></thead><tbody>" &
            "<tr><td><b>✏️ " & If(gblLang="EN","Designer","设计器") & "</b></td>" &
            "<td>" & If(gblLang="EN","Add elements, set sizes & properties, define variable fields, preview ZPL","添加元素、设置尺寸与属性、定义变量字段、预览 ZPL") & "</td>" &
            "<td><span class='tag amber'>" & If(gblLang="EN","Setup / Edit","配置 / 编辑") & "</span></td></tr>" &
            "<tr><td><b>📂 " & If(gblLang="EN","Templates","模板库") & "</b></td>" &
            "<td>" & If(gblLang="EN","Browse saved templates, search, load, duplicate, or delete","浏览已保存模板、搜索、加载、复制或删除") & "</td>" &
            "<td><span class='tag blue'>" & If(gblLang="EN","Manage templates","管理模板") & "</span></td></tr>" &
            "<tr><td><b>🖨️ " & If(gblLang="EN","Print","打印") & "</b></td>" &
            "<td>" & If(gblLang="EN","Select template, fill variables, generate & send ZPL to printer","选择模板、填写变量、生成并发送 ZPL 至打印机") & "</td>" &
            "<td><span class='tag green'>" & If(gblLang="EN","Print labels","打印标签") & "</span></td></tr>" &
            "<tr><td><b>📷 " & If(gblLang="EN","Scan & Print","扫描打印") & "</b></td>" &
            "<td>" & If(gblLang="EN","Scan order barcode → auto-fill template variables → one-click print","扫描订单条码 → 自动填充变量 → 一键打印") & "</td>" &
            "<td><span class='tag red'>" & If(gblLang="EN","Order fulfilment","订单发货") & "</span></td></tr>" &
            "</tbody></table>" &
            "<div class='info'>🌐 <b>" & If(gblLang="EN","Language:","语言切换：") & "</b> " &
            If(gblLang="EN","Tap <b>EN / 中文</b> in the top-right corner to switch between English and Chinese at any time.",
                            "点击右上角 <b>EN / 中文</b> 按钮，可随时在中英文之间切换。") &
            "</div>" &
            "<div class='tip'>💡 <b>" & If(gblLang="EN","All data is stored in Dataverse.","所有数据均存储在 Dataverse 中。") & "</b> " &
            If(gblLang="EN","Templates and settings persist across devices and sessions automatically.",
                            "模板和设置跨设备和会话自动保留。") &
            "</div></body></html>"
          Height: =Parent.Height - 92
          Width: =Parent.Width
          X: =0
          Y: =92

    - Html_Help_Designer:
        Control: HtmlViewer@2.1.0
        Properties:
          Visible: =locHelpTab = "designer"
          HtmlText: |
            ="<!DOCTYPE html><html><head><style>" &
            "body{font-family:'Segoe UI',Arial,sans-serif;padding:20px 28px;background:#f3f5fc;color:#1a1e3a;margin:0;}" &
            ".sh{font-size:13.5px;font-weight:700;color:#141626;margin:18px 0 8px;border-left:4px solid #FFB900;padding-left:10px;}" &

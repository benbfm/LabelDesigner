    # POST RAW ZPL TO PRINTER
    # Calls Power Automate flow ZebraPrint_Flow.Run(URL, ZPLContent)
    # Flow does HTTP POST → printer socket (port 9100)
    - Btn_PostZPL:
        Control: Button@0.0.45
        Properties:
          BasePaletteColor: =RGBA(255, 185, 0, 1)
          AccessibleLabel: =If(gblLang="EN","Send ZPL to printer","发送 ZPL 到打印机")
          BorderStyle: =BorderStyle.None
          Font: =Font.'Segoe UI'
          FontWeight: =FontWeight.SemiBold
          Height: =44
          OnSelect: |
            =If(IsBlank(gblZPLOutput),
              Set(gblMsg, {type: "warning", text: If(gblLang="EN","Generate ZPL first.","请先生成 ZPL。")}),
              If(IsBlank(TxtIn_PrinterURL.Text),
                Set(gblMsg, {type: "warning", text: If(gblLang="EN","Enter printer URL.","请输入打印机地址。")}),
                Set(gblPrintResult, ZebraPrint_Flow.Run(TxtIn_PrinterURL.Text, gblZPLOutput));
                If(gblPrintResult.statusCode = 200 || gblPrintResult.statusCode = 204,
                  Set(gblMsg, {type: "success", text: If(gblLang="EN","ZPL sent to printer!","ZPL 已发送至打印机！")}),
                  Set(gblMsg, {type: "error", text: If(gblLang="EN","Printer error. Check URL. HTTP ","打印机错误，请检查地址。HTTP ") &
                    Text(gblPrintResult.statusCode)}))))
          Text: =If(gblLang="EN","Post Raw ZPL to Printer","发送原始 ZPL 到打印机")
          Width: =Parent.Width - 412
          X: =402
          Y: =Parent.Height - 98


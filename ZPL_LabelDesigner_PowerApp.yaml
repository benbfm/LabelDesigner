            "th{background:#141626;color:#fff;padding:6px 10px;text-align:left;font-size:11.5px;}" &
            "td{padding:6px 10px;border-bottom:1px solid #d0d8f0;vertical-align:top;}" &
            "tr:nth-child(even) td{background:#f0f4ff;}" &
            "</style></head><body>" &
            "<div class='sh'>📐 " & If(gblLang="EN","Step 1 — Set the Label Size","第 1 步 — 设置标签尺寸") & "</div>" &
            "<div class='step'><div class='num'>1</div><div class='body'>" &
            If(gblLang="EN","In the left panel under <b>Label Size</b>, choose a <b>Preset</b> from the dropdown or enter Width and Height manually in dots.",
                            "在左侧面板<b>标签尺寸</b>区域，从下拉列表选择<b>预设尺寸</b>，或手动输入宽度和高度（单位：点）。") &
            "<div class='det'>" & If(gblLang="EN","At 203 DPI: 8 dots ≈ 1 mm. Example — 4×2 inch label = 812×406 dots.",
                                                  "203 DPI 下：8 点 ≈ 1 毫米。示例：4×2 英寸标签 = 812×406 点。") & "</div></div></div>" &
            "<div class='sh'>➕ " & If(gblLang="EN","Step 2 — Add & Position Elements","第 2 步 — 添加并放置元素") & "</div>" &
            "<div class='step'><div class='num'>1</div><div class='body'>" &
            If(gblLang="EN","Tap an <b>Add Element</b> button. Choose the type that fits your need:",
                            "点击<b>添加元素</b>按钮，选择适合的类型：") &
            "<div class='det'>" & If(gblLang="EN","🅃 Text — static or variable text | ▐▌ Code 128 — general 1D barcode | ⊞ QR — 2D code | EAN-13 — retail 13-digit | UPC-A — retail 12-digit | □ Box — border/line",
                                                  "🅃 文本 — 静态或变量文字 | ▐▌ Code 128 — 通用一维条码 | ⊞ 二维码 | EAN-13 — 零售13位 | UPC-A — 零售12位 | □ 方框 — 边框/分隔线") & "</div></div></div>" &
            "<div class='step'><div class='num'>2</div><div class='body'>" &
            If(gblLang="EN","The element appears in the <b>label preview</b> (centre) and the <b>element list</b> below. Tap any list row to select it.",
                            "新元素出现在中间<b>标签预览区</b>和下方<b>元素列表</b>中。点击任意行可选中该元素。") &
            "</div></div>" &
            "<div class='step'><div class='num'>3</div><div class='body'>" &
            If(gblLang="EN","Enter exact <b>X</b> and <b>Y</b> coordinates and <b>W / H</b> dimensions in the right-side properties panel to position and resize the element precisely.",
                            "在右侧属性面板中输入精确的 <b>X</b>、<b>Y</b> 坐标和 <b>W / H</b> 尺寸，对元素进行精确定位和调整。") &
            "</div></div>" &
            "<div class='sh'>🔧 " & If(gblLang="EN","Step 3 — Configure Each Element","第 3 步 — 配置每个元素") & "</div>" &
            "<table><thead><tr>" &
            "<th>" & If(gblLang="EN","Property","属性") & "</th>" &
            "<th>" & If(gblLang="EN","What it does","说明") & "</th>" &
            "<th>" & If(gblLang="EN","Available for","适用类型") & "</th></tr></thead><tbody>" &
            "<tr><td><b>X, Y</b></td><td>" & If(gblLang="EN","Distance in dots from top-left of label","距标签左上角的点数距离") & "</td><td>" & If(gblLang="EN","All types","全部") & "</td></tr>" &
            "<tr><td><b>W, H</b></td><td>" & If(gblLang="EN","Width and height in dots","宽度和高度（点数）") & "</td><td>" & If(gblLang="EN","All types","全部") & "</td></tr>" &
            "<tr><td><b>" & If(gblLang="EN","Default Content","默认内容") & "</b></td><td>" & If(gblLang="EN","Text or barcode value used when no variable is provided","未提供变量时使用的默认文本或条码内容") & "</td><td>" & If(gblLang="EN","Text, Barcode","文本、条码") & "</td></tr>" &
            "<tr><td><b>" & If(gblLang="EN","Orientation","打印方向") & "</b></td><td>" & If(gblLang="EN","N=Normal  R=90°  I=180°  B=270°","N=正常  R=旋转90°  I=倒置180°  B=270°") & "</td><td>" & If(gblLang="EN","Text, Barcode","文本、条码") & "</td></tr>" &
            "<tr><td><b>" & If(gblLang="EN","Show Value (HRI)","显示数值(HRI)") & "</b></td><td>" & If(gblLang="EN","Checked = print barcode number in readable text below bars; Unchecked = bars only","勾选 = 在条形码下方打印可读数字；不勾选 = 仅显示条形") & "</td><td>" & If(gblLang="EN","Code128, EAN-13, UPC-A","Code128、EAN-13、UPC-A") & "</td></tr>" &
            "<tr><td><b>QR Mag</b></td><td>" & If(gblLang="EN","QR module size 1 (smallest) to 10 (largest)","二维码模块大小 1（最小）到 10（最大）") & "</td><td>" & If(gblLang="EN","QR Code only","仅二维码") & "</td></tr>" &
            "<tr><td><b>" & If(gblLang="EN","Mark as Variable","标记为变量") & "</b></td><td>" & If(gblLang="EN","Makes this field fillable at print time — shows as {VariableName} in preview","打印时可填写该字段，预览中显示为 {变量名称}") & "</td><td>" & If(gblLang="EN","Text, Barcode","文本、条码") & "</td></tr>" &
            "<tr><td><b>" & If(gblLang="EN","Variable Name","变量名称") & "</b></td><td>" & If(gblLang="EN","Label for this field on the Print screen — e.g. OrderNo, SKU, CustomerName","打印界面中该字段的标签名，例如：订单号、SKU、客户名称") & "</td><td>" & If(gblLang="EN","When Variable ✓","勾选变量后") & "</td></tr>" &
            "</tbody></table>" &
            "<div class='sh'>↕️ " & If(gblLang="EN","Reorder Elements","调整元素顺序") & "</div>" &
            "<div class='step'><div class='num'>▲▼</div><div class='body'>" &
            If(gblLang="EN","Use the <b>▲</b> / <b>▼</b> buttons in the element list to change print order. Elements higher in the list print first in ZPL output.",
                            "使用元素列表中的 <b>▲</b> / <b>▼</b> 按钮调整打印顺序。列表靠上的元素在 ZPL 中先打印。") &
            "</div></div>" &
            "<div class='warn'>⚠️ <b>" & If(gblLang="EN","Remember to save!","记得保存！") & "</b> " &
            If(gblLang="EN","Tap 💾 Save Template before switching screens. Unsaved changes are lost when you navigate away.",
                            "切换界面前请点击 💾 保存模板。离开界面后未保存的更改将丢失。") &
            "</div>" &
            "<div class='tip'>💡 <b>" & If(gblLang="EN","Import existing ZPL:","导入现有 ZPL：") & "</b> " &
            If(gblLang="EN","Tap ↓ Import ZPL, paste your ZPL code, and tap Parse & Import. All elements are automatically detected and made editable.",
                            "点击 ↓ 导入 ZPL，粘贴 ZPL 代码后点击解析并导入，所有元素将被自动识别为可编辑状态。") &
            "</div></body></html>"
          Height: =Parent.Height - 92
          Width: =Parent.Width
          X: =0
          Y: =92

    - Html_Help_Library:
        Control: HtmlViewer@2.1.0
        Properties:
          Visible: =locHelpTab = "library"
          HtmlText: |
            ="<!DOCTYPE html><html><head><style>" &
            "body{font-family:'Segoe UI',Arial,sans-serif;padding:20px 28px;background:#f3f5fc;color:#1a1e3a;margin:0;}" &
            ".sh{font-size:13.5px;font-weight:700;color:#141626;margin:18px 0 8px;border-left:4px solid #FFB900;padding-left:10px;}" &
            ".step{background:#fff;border:1px solid #d0d8f0;border-radius:8px;padding:12px 14px;display:flex;gap:12px;align-items:flex-start;margin-bottom:8px;}" &
            ".num{background:#FFB900;color:#141626;font-weight:800;font-size:11px;min-width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}" &
            ".body{font-size:13px;line-height:1.5;}" &
            ".det{font-size:11.5px;color:#4a5580;margin-top:5px;background:#f0f4ff;padding:5px 8px;border-radius:4px;}" &
            ".tip{background:#fffbea;border-left:4px solid #FFB900;border-radius:6px;padding:10px 13px;font-size:12px;line-height:1.6;margin:12px 0;}" &
            ".warn{background:#fff3f3;border-left:4px solid #e53e3e;border-radius:6px;padding:10px 13px;font-size:12px;line-height:1.6;margin:12px 0;}" &
            "</style></head><body>" &
            "<div class='sh'>💾 " & If(gblLang="EN","Saving a Template","保存模板") & "</div>" &
            "<div class='step'><div class='num'>1</div><div class='body'>" &
            If(gblLang="EN","Build your label in the ✏️ Designer screen and finish all elements.",
                            "在 ✏️ 设计器界面完成标签的所有元素设计。") &
            "</div></div>" &
            "<div class='step'><div class='num'>2</div><div class='body'>" &
            If(gblLang="EN","At the top of the Designer, enter a descriptive <b>Template Name</b> (e.g. Shipping Label – 4x2 in).",
                            "在设计器顶部输入描述性的<b>模板名称</b>（例如：发货标签 – 4×2 英寸）。") &
            "</div></div>" &
            "<div class='step'><div class='num'>3</div><div class='body'>" &
            If(gblLang="EN","(Optional) Enter a <b>Linked SKU</b> so the Scan & Print screen can automatically select this template when that SKU is detected.",
                            "（可选）填写<b>关联 SKU</b>，使扫描打印界面在识别到该 SKU 时自动选用此模板。") &
            "</div></div>" &
            "<div class='step'><div class='num'>4</div><div class='body'>" &
            If(gblLang="EN","Tap <b>💾 Save Template</b>. A success message confirms the save. The template appears on the 📂 Templates screen immediately.",
                            "点击 <b>💾 保存模板</b>，成功提示确认保存，模板随即出现在 📂 模板库界面。") &
            "</div></div>" &
            "<div class='sh'>📂 " & If(gblLang="EN","Loading / Editing a Template","加载 / 编辑模板") & "</div>" &
            "<div class='step'><div class='num'>1</div><div class='body'>" &
            If(gblLang="EN","Go to 📂 Templates from the nav bar. All saved templates are shown as cards with a miniature label preview.",
                            "从导航栏前往 📂 模板库，所有已保存的模板以卡片形式展示，并附有缩略预览。") &
            "</div></div>" &
            "<div class='step'><div class='num'>2</div><div class='body'>" &
            If(gblLang="EN","Use the 🔍 Search box to filter templates by name. Results update as you type.",
                            "使用 🔍 搜索框按名称筛选模板，结果实时更新。") &
            "</div></div>" &
            "<div class='step'><div class='num'>3</div><div class='body'>" &
            If(gblLang="EN","Tap <b>✏️ Edit</b> on a template card to open it in the Designer with all elements fully loaded.",
                            "点击模板卡片上的 <b>✏️ 编辑</b>，在设计器中打开并完整载入所有元素。") &
            "</div></div>" &
            "<div class='step'><div class='num'>4</div><div class='body'>" &
            If(gblLang="EN","Make your changes and tap 💾 Save Template again to overwrite, or change the name first to save as a new copy.",
                            "进行修改后再次点击 💾 保存模板覆盖原版，或先修改名称以保存为新副本。") &
            "</div></div>" &
            "<div class='sh'>⧉ " & If(gblLang="EN","Duplicating a Template","复制模板") & "</div>" &
            "<div class='step'><div class='num'>1</div><div class='body'>" &
            If(gblLang="EN","On the template card, tap <b>⧉ Duplicate</b>. A copy named Template (Copy) is created instantly.",
                            "点击模板卡片上的 <b>⧉ 复制</b>，将立即创建一个名为 模板(副本) 的复件。") &
            "</div></div>" &
            "<div class='step'><div class='num'>2</div><div class='body'>" &
            If(gblLang="EN","Open the copy with ✏️ Edit, rename it, then save — a fast way to create variants of the same label.",
                            "用 ✏️ 编辑打开副本，重命名后保存 — 快速创建同一标签变体的便捷方法。") &
            "</div></div>" &
            "<div class='sh'>🗑 " & If(gblLang="EN","Deleting a Template","删除模板") & "</div>" &
            "<div class='step'><div class='num'>1</div><div class='body'>" &
            If(gblLang="EN","Tap <b>🗑 Delete</b> on the template card and confirm when prompted.",
                            "点击模板卡片上的 <b>🗑 删除</b>，在弹窗中确认操作。") &
            "</div></div>" &
            "<div class='warn'>⚠️ <b>" & If(gblLang="EN","Deletion cannot be undone.","删除不可撤销。") & "</b> " &
            If(gblLang="EN","Deleted templates are permanently removed. Duplicate a template before deleting if you are unsure.",
                            "已删除的模板将永久移除，无法恢复。如有疑虑，请在删除前先复制一份。") &
            "</div>" &
            "<div class='tip'>💡 <b>" & If(gblLang="EN","SKU linking:","SKU 关联：") & "</b> " &
            If(gblLang="EN","Link a template to a product SKU. When an order for that SKU is scanned on the Scan & Print screen, the correct template is selected automatically.",
                            "将模板与产品 SKU 关联。在扫描打印界面扫描该 SKU 的订单时，系统将自动选择对应模板。") &
            "</div></body></html>"
          Height: =Parent.Height - 92
          Width: =Parent.Width
          X: =0
          Y: =92

    - Html_Help_Print:
        Control: HtmlViewer@2.1.0
        Properties:
          Visible: =locHelpTab = "print"
          HtmlText: |
            ="<!DOCTYPE html><html><head><style>" &
            "body{font-family:'Segoe UI',Arial,sans-serif;padding:20px 28px;background:#f3f5fc;color:#1a1e3a;margin:0;}" &
            ".sh{font-size:13.5px;font-weight:700;color:#141626;margin:18px 0 8px;border-left:4px solid #FFB900;padding-left:10px;}" &
            ".step{background:#fff;border:1px solid #d0d8f0;border-radius:8px;padding:12px 14px;display:flex;gap:12px;align-items:flex-start;margin-bottom:8px;}" &
            ".num{background:#FFB900;color:#141626;font-weight:800;font-size:11px;min-width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}" &
            ".body{font-size:13px;line-height:1.5;}" &
            ".det{font-size:11.5px;color:#4a5580;margin-top:5px;background:#f0f4ff;padding:5px 8px;border-radius:4px;}" &
            ".info{background:#eef4ff;border-left:4px solid #3B5BDB;border-radius:6px;padding:10px 13px;font-size:12px;line-height:1.6;margin:12px 0;}" &
            ".tip{background:#fffbea;border-left:4px solid #FFB900;border-radius:6px;padding:10px 13px;font-size:12px;line-height:1.6;margin:12px 0;}" &
            ".warn{background:#fff3f3;border-left:4px solid #e53e3e;border-radius:6px;padding:10px 13px;font-size:12px;line-height:1.6;margin:12px 0;}" &
            "code{background:#e8eaf0;border:1px solid #b0b8d0;border-radius:3px;padding:1px 5px;font-family:monospace;font-size:11px;}" &
            "</style></head><body>" &
            "<div class='sh'>🖨️ " & If(gblLang="EN","How to Print a Label (Step-by-Step)","如何打印标签（分步说明）") & "</div>" &
            "<div class='step'><div class='num'>1</div><div class='body'>" &
            If(gblLang="EN","Tap <b>🖨️ Print</b> in the navigation bar to open the Print screen.",
                            "点击导航栏中的 <b>🖨️ 打印</b>，打开打印界面。") &
            "</div></div>" &
            "<div class='step'><div class='num'>2</div><div class='body'>" &
            If(gblLang="EN","Use the <b>Select Template</b> dropdown to choose the label design you want to print.",
                            "使用<b>选择模板</b>下拉菜单，选择要打印的标签设计。") &
            "<div class='det'>" & If(gblLang="EN","If the list is empty, go to ✏️ Designer first to build and save a template.",
                                                  "如果列表为空，请先前往 ✏️ 设计器创建并保存模板。") & "</div></div></div>" &
            "<div class='step'><div class='num'>3</div><div class='body'>" &
            If(gblLang="EN","If the template has <b>variable fields</b>, an input box appears for each one. Fill in the value for this print job — e.g. order number, batch code, product name.",
                            "如果模板包含<b>变量字段</b>，每个变量都会显示一个输入框，填写本次打印的内容，例如订单号、批次码或产品名称。") &
            "<div class='det'>" & If(gblLang="EN","Variable fields were created in the Designer by enabling Mark as Variable on an element — they show as {VariableName} in the preview.",
                                                  "变量字段是在设计器中为元素启用标记为变量后创建的，在预览中显示为 {变量名称}。") & "</div></div></div>" &
            "<div class='step'><div class='num'>4</div><div class='body'>" &
            If(gblLang="EN","Tap <b>⚡ Generate ZPL</b>. The ZPL code is built and shown in the output area. The label preview updates to show the filled values.",
                            "点击 <b>⚡ 生成 ZPL</b>，ZPL 代码生成并显示在输出区域，标签预览同时更新为填写后的内容。") &
            "</div></div>" &
            "<div class='step'><div class='num'>5</div><div class='body'>" &
            If(gblLang="EN","Check the <b>Printer URL</b> field. If empty, enter the Zebra printer's network address — e.g. <code>http://192.168.1.100:9100</code>",
                            "检查<b>打印机地址</b>字段。若为空，请填入斑马打印机的网络地址，例如：<code>http://192.168.1.100:9100</code>") &
            "<div class='det'>" & If(gblLang="EN","The address is saved automatically after first entry — remembered for future sessions.",
                                                  "首次填写后地址会自动保存，后续会话无需重复输入。") & "</div></div></div>" &
            "<div class='step'><div class='num'>6</div><div class='body'>" &
            If(gblLang="EN","Tap <b>🖨 Send Raw ZPL to Printer</b>. A green success message confirms the label was sent.",
                            "点击 <b>🖨 发送原始 ZPL 到打印机</b>，绿色成功提示确认标签已发送。") &
            "</div></div>" &
            "<div class='sh'>📥 " & If(gblLang="EN","Saving / Copying the ZPL","保存 / 复制 ZPL") & "</div>" &
            "<div class='step'><div class='num'>📋</div><div class='body'>" &
            If(gblLang="EN","Tap <b>📋 Copy ZPL</b> to copy the code to clipboard — paste it into any ZPL tool or terminal.",
                            "点击 <b>📋 复制 ZPL</b> 将代码复制到剪贴板，可粘贴到任意 ZPL 工具或终端。") &
            "</div></div>" &
            "<div class='step'><div class='num'>🔢</div><div class='body'>" &
            If(gblLang="EN","Use the <b>Quantity</b> field to print multiple copies in one send — the ZPL ^PQ command is added automatically.",
                            "使用<b>数量</b>字段，单次发送可打印同一标签的多个副本，系统自动添加 ZPL 的 ^PQ 命令。") &
            "</div></div>" &
            "<div class='info'>🌐 <b>" & If(gblLang="EN","Network requirement:","网络要求：") & "</b> " &
            If(gblLang="EN","The Zebra printer must be connected to the same network as your device. Standard raw ZPL port is <b>9100</b>. Contact your IT team if unsure of the printer's IP.",
                            "斑马打印机须与您的设备处于同一网络。原始 ZPL 标准端口为 <b>9100</b>。如不确定打印机 IP，请联系 IT 团队。") &
            "</div>" &
            "<div class='warn'>⚠️ <b>" & If(gblLang="EN","If the printer does not respond:","如果打印机无响应：") & "</b> " &
            If(gblLang="EN","Check that (1) the printer is powered on, (2) network is connected, (3) the IP in Printer URL is correct, and (4) port 9100 is not blocked by a firewall.",
                            "请检查：(1) 打印机是否开机；(2) 网络是否连接；(3) 打印机地址中的 IP 是否正确；(4) 防火墙是否拦截了 9100 端口。") &
            "</div></body></html>"
          Height: =Parent.Height - 92
          Width: =Parent.Width
          X: =0
          Y: =92

    - Html_Help_Scan:
        Control: HtmlViewer@2.1.0
        Properties:
          Visible: =locHelpTab = "scan"
          HtmlText: |
            ="<!DOCTYPE html><html><head><style>" &
            "body{font-family:'Segoe UI',Arial,sans-serif;padding:20px 28px;background:#f3f5fc;color:#1a1e3a;margin:0;}" &
            ".sh{font-size:13.5px;font-weight:700;color:#141626;margin:18px 0 8px;border-left:4px solid #FFB900;padding-left:10px;}" &
            ".step{background:#fff;border:1px solid #d0d8f0;border-radius:8px;padding:12px 14px;display:flex;gap:12px;align-items:flex-start;margin-bottom:8px;}" &
            ".num{background:#FFB900;color:#141626;font-weight:800;font-size:11px;min-width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}" &
            ".body{font-size:13px;line-height:1.5;}" &
            ".det{font-size:11.5px;color:#4a5580;margin-top:5px;background:#f0f4ff;padding:5px 8px;border-radius:4px;}" &
            ".info{background:#eef4ff;border-left:4px solid #3B5BDB;border-radius:6px;padding:10px 13px;font-size:12px;line-height:1.6;margin:12px 0;}" &
            ".tip{background:#fffbea;border-left:4px solid #FFB900;border-radius:6px;padding:10px 13px;font-size:12px;line-height:1.6;margin:12px 0;}" &
            "table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:14px;}" &
            "th{background:#141626;color:#fff;padding:6px 10px;text-align:left;font-size:11.5px;}" &
            "td{padding:6px 10px;border-bottom:1px solid #d0d8f0;vertical-align:top;}" &
            "tr:nth-child(even) td{background:#f0f4ff;}" &
            ".tag{display:inline-block;padding:2px 7px;border-radius:10px;font-size:11px;font-weight:600;}" &
            ".amber{background:#fff3cc;color:#7a4f00;}.blue{background:#e0e8ff;color:#2a3a99;}.green{background:#e0f5e9;color:#1a6b3a;}" &
            "</style></head><body>" &
            "<div class='sh'>📷 " & If(gblLang="EN","How to Scan & Print (Step-by-Step)","如何扫描并打印（分步说明）") & "</div>" &
            "<div class='step'><div class='num'>1</div><div class='body'>" &
            If(gblLang="EN","Tap <b>📷 Scan & Print</b> in the navigation bar.",
                            "点击导航栏中的 <b>📷 扫描打印</b>。") &
            "</div></div>" &
            "<div class='step'><div class='num'>2</div><div class='body'>" &
            If(gblLang="EN","<b>Scan the order barcode</b> using one of three methods:",
                            "<b>扫描订单条码</b>，可选以下三种方式之一：") &
            "<div class='det'>" &
            If(gblLang="EN",
              "📡 <b>USB Scanner (recommended):</b> Tap the Order # input box to focus it, then pull the trigger on your scanner gun. The barcode is typed in automatically and the lookup runs immediately.<br><br>" &
              "📷 <b>Camera:</b> Tap ▶ Start Camera and point the camera at the barcode — auto-detected when a valid barcode is in frame.<br><br>" &
              "⌨️ <b>Manual:</b> Tap the input box, type the order number, and tap Go / Enter.",
              "📡 <b>USB 扫描枪（推荐）：</b> 点击订单号输入框使其获得焦点，然后扣下扫描枪扳机，条码值将自动填入并立即查询。<br><br>" &
              "📷 <b>摄像头：</b> 点击 ▶ 开始摄像，将摄像头对准条码，检测到有效条码后自动识别。<br><br>" &
              "⌨️ <b>手动输入：</b> 点击输入框，输入订单号，点击确定 / 回车。") &
            "</div></div></div>" &
            "<div class='step'><div class='num'>3</div><div class='body'>" &
            If(gblLang="EN","The app looks up the order and displays details — SKU, product name, quantity, and customer — in the Order Info panel.",
                            "应用查询订单，并在订单信息面板中显示详情，包括 SKU、产品名称、数量和客户信息。") &
            "</div></div>" &
            "<div class='step'><div class='num'>4</div><div class='body'>" &
            If(gblLang="EN","The <b>Label Template</b> is selected automatically if the SKU matches a linked template. Otherwise, choose the correct template from the dropdown.",
                            "如果 SKU 与已关联的模板匹配，<b>标签模板</b>将自动选中；否则请从下拉菜单手动选择正确的模板。") &
            "<div class='det'>" & If(gblLang="EN","To link a template to a SKU: open the template in Designer, type the SKU in the Linked SKU field, and save.",
                                                  "关联模板与 SKU 的方法：在设计器中打开该模板，在关联 SKU 字段输入 SKU，保存即可。") & "</div></div></div>" &
            "<div class='step'><div class='num'>5</div><div class='body'>" &
            If(gblLang="EN","Check the <b>Variable Mapping</b> panel — the app auto-filled each variable from the order data. Adjust any value if needed.",
                            "检查<b>变量映射</b>面板，应用已从订单数据中自动填写各变量字段，如需调整可手动修改。") &
            "</div></div>" &
            "<div class='step'><div class='num'>6</div><div class='body'>" &
            If(gblLang="EN","Tap <b>Proceed to Print →</b>. The app opens the 🖨️ Print screen with all variable values pre-loaded.",
                            "点击 <b>前往打印 →</b>，应用跳转至 🖨️ 打印界面，所有变量值已预先填写完毕。") &
            "</div></div>" &
            "<div class='step'><div class='num'>7</div><div class='body'>" &
            If(gblLang="EN","Tap <b>⚡ Generate ZPL</b> then <b>🖨 Send Raw ZPL to Printer</b>. The label prints immediately.",
                            "点击 <b>⚡ 生成 ZPL</b>，再点击 <b>🖨 发送原始 ZPL 到打印机</b>，标签立即打印。") &
            "</div></div>" &
            "<div class='sh'>📱 " & If(gblLang="EN","Scanning Method Comparison","扫描方式对比") & "</div>" &
            "<table><thead><tr>" &
            "<th>" & If(gblLang="EN","Method","方式") & "</th>" &
            "<th>" & If(gblLang="EN","Best for","适用场景") & "</th>" &
            "<th>" & If(gblLang="EN","Works on","支持平台") & "</th></tr></thead><tbody>" &
            "<tr><td>📡 <b>" & If(gblLang="EN","USB Scanner","USB 扫描枪") & "</b></td>" &
            "<td>" & If(gblLang="EN","High-volume, fastest, any label format","高频作业，速度最快，支持任何格式") & "</td>" &
            "<td><span class='tag green'>" & If(gblLang="EN","All devices","全部设备") & "</span></td></tr>" &
            "<tr><td>📷 <b>" & If(gblLang="EN","Camera","摄像头") & "</b></td>" &
            "<td>" & If(gblLang="EN","No scanner hardware, mobile use","无扫描枪设备，移动端") & "</td>" &
            "<td><span class='tag blue'>" & If(gblLang="EN","Chrome/Edge/Android","Chrome/Edge/安卓") & "</span></td></tr>" &
            "<tr><td>⌨️ <b>" & If(gblLang="EN","Manual entry","手动输入") & "</b></td>" &
            "<td>" & If(gblLang="EN","Corrections, unlabelled items, testing","纠错、无标签物品、测试") & "</td>" &
            "<td><span class='tag amber'>" & If(gblLang="EN","All devices","全部设备") & "</span></td></tr>" &
            "</tbody></table>" &
            "<div class='tip'>💡 <b>" & If(gblLang="EN","Fastest daily workflow:","最快日常操作：") & "</b> " &
            If(gblLang="EN","Keep the Scan & Print screen open all day. Each scan takes under 5 seconds from trigger to printed label — scan → auto-fill → Generate → Send.",
                            "全天保持扫描打印界面开启，每次从扫描到打印完成不超过5秒 — 扫描 → 自动填充 → 生成 → 发送。") &
            "</div>" &
            "<div class='info'>📱 <b>" & If(gblLang="EN","iPhone / iPad users:","iPhone / iPad 用户：") & "</b> " &
            If(gblLang="EN","Camera barcode detection requires the Power Apps mobile app. Alternatively, use a USB or Bluetooth barcode scanner — these work on all devices without restriction.",
                            "摄像头条码识别需使用 Power Apps 移动应用。建议改用 USB 或蓝牙扫描枪，无设备和平台限制。") &
            "</div></body></html>"
          Height: =Parent.Height - 92
          Width: =Parent.Width

              X: =46 + Round(Parent.Width * 0.37, 0)
              Y: =0

        - Lbl_RowSize:
            Control: Label
            Properties:
              TabIndex: =0
              Color: =RGBA(70,45,10,1)
              Font: =Font.'Segoe UI'

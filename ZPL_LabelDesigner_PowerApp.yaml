  # ─────────────────────────────────────────────────────────────────────────
  # PRINT SCREEN  — fill variables · generate ZPL · post to printer
  # ─────────────────────────────────────────────────────────────────────────
  PrintScreen:
    Properties:
      Fill: =RGBA(243,245,252,1)
      OnVisible: |
        =Set(gblMsg, {type: "", text: ""});
        ClearCollect(colTemplates, ZPL_LabelTemplates);
        // If navigated from ScanScreen the template + vars are already loaded — skip reload
        If(!gblFromScan,
          If(!IsBlank(gblPrintTplId),
            Set(gblActivePrintTpl, LookUp(colTemplates, ID = gblPrintTplId));
            ClearCollect(colPrintElems,
              ForAll(Table(ParseJSON(gblActivePrintTpl.ElementsJSON)),
                {id: "" & ThisRecord.Value.id, type: "" & ThisRecord.Value.type,
                 x: Value(Text(ThisRecord.Value.x)), y: Value(Text(ThisRecord.Value.y)),
                 width: Value(Text(ThisRecord.Value.width)), height: Value(Text(ThisRecord.Value.height)),
                 orientation: "" & ThisRecord.Value.orientation,
                 content: "" & ThisRecord.Value.content,
                 isVariable: Boolean(ThisRecord.Value.isVariable),
                 variableName: "" & ThisRecord.Value.variableName,
                 fontH: Value(Text(ThisRecord.Value.fontH)), fontW: Value(Text(ThisRecord.Value.fontW)),
                 thickness: Value(Text(ThisRecord.Value.thickness)),
                 magnification: Value(Text(ThisRecord.Value.magnification)),
                 showValue: Boolean(ThisRecord.Value.showValue)}));
            ClearCollect(colPrintVals,
              ForAll(Filter(colPrintElems, isVariable && variableName <> ""),
                {varName: variableName, value: content}))));
        Set(gblFromScan, false)

          Width: =Parent.Width - 222 - 262
          X: =222
          Y: =100 + (Parent.Height - 100) / 2 + 28

        Children:
        - Rect_Row:
            Control: Rectangle
            Properties:
              TabIndex: =0
              AccessibleLabel: =If(gblLang="EN","Element row","元素行")
              Fill: =If(ThisItem.id = gblSelectedElem.id, RGBA(255,185,0,1), RGBA(248,249,254,1))
              Height: =36
              Width: =Parent.Width
              X: =0
              Y: =0

        # Row labels — proportional to Parent.Width (= gallery width inside template)

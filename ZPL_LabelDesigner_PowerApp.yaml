              Width: =Round(Parent.Width * 0.15, 0)
              X: =50 + Round(Parent.Width * 0.52, 0)
              Y: =0

        - Lbl_RowOri:
            Control: Label
            Properties:
              TabIndex: =0
              Color: =RGBA(70,45,10,1)
              Font: =Font.'Segoe UI'
              Height: =36
              Size: =11
              FocusedBorderThickness: =2
              Text: =ThisItem.orientation
              Width: =Round(Parent.Width * 0.08, 0)
              X: =54 + Round(Parent.Width * 0.67, 0)
              Y: =0

        # ▲ Move Up  — left of the two horizontal seq buttons
        # X offset -70 leaves room for the gallery scrollbar (~14 px) so buttons stay visible
        - Btn_RowUp:
            Control: Button@0.0.45
            Properties:
              BasePaletteColor: =RGBA(255, 185, 0, 1)
              AccessibleLabel: =If(gblLang="EN","Move element up","上移元素")
              Font: =Font.'Segoe UI'
              Height: =26
              OnSelect: |
                =With({
                  currId:   ThisItem.id,
                  currSeq:  ThisItem.seq,
                  currY:    ThisItem.y,
                  prevElem: LookUp(colElements, seq = Max(Filter(colElements, seq < ThisItem.seq), seq))
                },
                  If(!IsBlank(prevElem),
                    // Swap both Y (physical label position → ZPL ^FO output changes)
                    // and seq (list order stays consistent with visual top-to-bottom order).
                    Patch(colElements, LookUp(colElements, id = currId),      {y: prevElem.y, seq: prevElem.seq});
                    Patch(colElements, LookUp(colElements, id = prevElem.id), {y: currY,      seq: currSeq});
                    Set(gblSeqTick, gblSeqTick + 1)
                  )
                )
              Text: ="▲"
              Width: =26
              X: =Parent.Width - 70
              Y: =5

        # ▼ Move Down — right of the two horizontal seq buttons
        - Btn_RowDown:
            Control: Button@0.0.45
            Properties:
              BasePaletteColor: =RGBA(255, 185, 0, 1)
              AccessibleLabel: =If(gblLang="EN","Move element down","下移元素")
              Font: =Font.'Segoe UI'
              Height: =26
              OnSelect: |
                =With({
                  currId:   ThisItem.id,
                  currSeq:  ThisItem.seq,
                  currY:    ThisItem.y,
                  nextElem: LookUp(colElements, seq = Min(Filter(colElements, seq > ThisItem.seq), seq))
                },
                  If(!IsBlank(nextElem),
                    Patch(colElements, LookUp(colElements, id = currId),      {y: nextElem.y, seq: nextElem.seq});
                    Patch(colElements, LookUp(colElements, id = nextElem.id), {y: currY,      seq: currSeq});
                    Set(gblSeqTick, gblSeqTick + 1)
                  )
                )
              Text: ="▼"
              Width: =26
              X: =Btn_RowUp.X+Btn_RowUp.Width+2
              Y: =5

        # Transparent click-trap — must be LAST so it sits on top of Rect_Row
        # and all labels. Narrowed to leave the ▲▼ button column uncovered.
        # Width -74 = -70 (Btn_RowUp left edge) minus 4 px gap
        - Rect_RowSel:

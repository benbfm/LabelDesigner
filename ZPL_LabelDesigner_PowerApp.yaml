    # Label Size Preset selector — Items uses | block scalar to avoid YAML
    # misreading the Table() record syntax {key: value} as YAML mappings.
    - DD_Preset:
        Control: DropDown
        Properties:
          AccessibleLabel: =If(gblLang="EN","Select label size preset","选择标签尺寸预设")
          Height: =34
          Items: |
            =Table(
              {Value: "-- Custom --",          w: 0,    h: 0},
              {Value: "4x2 in  (812x406)",     w: 812,  h: 406},
              {Value: "4x3 in  (812x609)",     w: 812,  h: 609},
              {Value: "4x4 in  (812x812)",     w: 812,  h: 812},
              {Value: "4x6 in  (812x1218)",    w: 812,  h: 1218},
              {Value: "6x4 in  (1218x812)",    w: 1218, h: 812},
              {Value: "6x2 in  (1218x406)",    w: 1218, h: 406},
              {Value: "2x1 in  (406x203)",     w: 406,  h: 203},
              {Value: "100x50mm  (800x400)",   w: 800,  h: 400},
              {Value: "100x100mm (800x800)",   w: 800,  h: 800},
              {Value: "100x150mm (800x1200)",  w: 800,  h: 1200}
            )
          OnChange: |
            =If(DD_Preset.Selected.w > 0,
              Set(gblLabelWidth,  DD_Preset.Selected.w);
              Set(gblLabelHeight, DD_Preset.Selected.h);
              Set(gblScale, If(gblLabelWidth > 0 && gblLabelHeight > 0,
                Min(820 / gblLabelWidth, 420 / gblLabelHeight), 1));
              Reset(TxtIn_LblW);
              Reset(TxtIn_LblH)
            )
          Width: =202
          X: =10
          Y: =132


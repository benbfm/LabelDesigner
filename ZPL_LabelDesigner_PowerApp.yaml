
App:
  Properties:

    OnStart: |
      =Set(gblLang, "EN");
      Set(gblLabelWidth, 600);
      Set(gblLabelHeight, 400);
      Set(gblScale, Min(820 / 600, 420 / 400));
      Set(gblNextElemId, 1);
      Set(gblCurrentTplId, Blank());
      Set(gblSelectedElem, First(Filter(colElements, false)));
      Set(gblShowModal, false);
      Set(gblShowImportModal, false);
      Set(gblScaleAdj, 1.0);
      Set(gblImportZPL, "");
      Set(gblScaleMode, "FixH");   // Default: Fix to Height — fits label in canvas vertically
      Set(gblMsg, {type: "", text: ""});  // MSG: global message popup — {type:"success"|"warning"|"error", text:"..."}
      // NOTE: gblPrintResult intentionally NOT pre-initialized here.
      // Pre-initializing with {statusCode:0} creates a type conflict with the full
      // flow response shape returned by ZebraPrint_Flow.Run() — PA infers incompatible
      // record types and reports "Incompatible type" on every Set(gblMsg,...) that
      // references gblPrintResult.statusCode. Safe to omit because statusCode is only
      // ever read immediately after the flow runs in Btn_PostZPL.OnSelect.
      Set(gblSeqTick, 0);    // FIX: global tick counter for ▲/▼ seq preview refresh — must be Set() not UpdateContext() so Html_Canvas (screen scope) sees the change
      Set(gblZPLOutput, "");
      Set(gblPrinterURL, "http://192.168.1.100:9100");
      Set(gblDPI, 203);          // 203 | 300 | 600
      Set(gblActivePrintTpl, First(Filter(ZPL_LabelTemplates, false)));
      Set(gblPrintTplId, First(Filter(ZPL_LabelTemplates, false)).ID);
      Set(gblTemplateName, "Untitled Template");
      Set(gblScannedOrder, Blank());
      Set(gblMatchedScanTpl, Blank());
      Set(gblScanStatus, "idle");
      Set(gblFromScan, false);
      // FIX: schema declaration required so named formulas (ZPLDesigner, CanvasHTML) can
      //      type-check ThisRecord.x/y/fontH/etc. at design time — without this, Text(ThisRecord.x)
      //      throws "invalid arguments" because PA cannot infer field types from a screen-level ClearCollect
      ClearCollect(colElements, Filter([
        {id:"_",type:"TEXT",x:0,y:0,width:0,height:0,orientation:"N",
         content:"",isVariable:false,variableName:"",
         fontH:0,fontW:0,thickness:0,magnification:0,seq:0,showValue:true}
      ], false));
      // FIX: same schema declaration needed for colPrintElems used in ZPLPrint named formula
      ClearCollect(colPrintElems, Filter([
        {id:"_",type:"TEXT",x:0,y:0,width:0,height:0,orientation:"N",
         content:"",isVariable:false,variableName:"",
         fontH:0,fontW:0,thickness:0,magnification:0,seq:0,showValue:true}
      ], false));
      ClearCollect(colPrintVals, []);
      ClearCollect(colTemplates, ZPL_LabelTemplates);
      // Declare colSegs schema so PA can type-check the import pipeline at design time
      ClearCollect(colSegs, Filter([{seg: ""}], false));
      // Schema declaration for scan variable mapping collection
      ClearCollect(colScanVarMap, Filter([{varName: "", value: ""}], false))

    Formulas: |
      =ZPLDesigner =
        "^XA" & Char(10) &
        "^MMT" & Char(10) &
        "^PW" & Text(gblLabelWidth) & Char(10) &
        "^LL" & Text(gblLabelHeight) & Char(10) &
        "^LH0,0" & Char(10) &
        Concat(Sort(colElements, seq, SortOrder.Ascending), // FIX: bare "seq" not "ThisRecord.seq"
          "^FO" & Text(ThisRecord.x) & "," & Text(ThisRecord.y) & Char(10) &
          Switch(ThisRecord.type,
            "TEXT",
              "^A0" & ThisRecord.orientation & "," & Text(ThisRecord.fontH) & "," & Text(ThisRecord.fontW) & Char(10) &
              "^FB" & Text(ThisRecord.width) & ",1,0,L,0" & Char(10) &
              "^FD" & ThisRecord.content & "^FS" & Char(10),
            "CODE128",
              "^BY2,3," & Text(ThisRecord.height) & Char(10) &
              "^BC" & ThisRecord.orientation & "," & Text(ThisRecord.height) &
              "," & If(ThisRecord.showValue,"Y","N") & ",N,N" & Char(10) &
              "^FD" & ThisRecord.content & "^FS" & Char(10),
            "QRCODE",
              "^BQ" & ThisRecord.orientation & ",2," & Text(ThisRecord.magnification) & Char(10) &
              "^FDQA," & ThisRecord.content & "^FS" & Char(10),
            "EAN13",
              "^BE" & ThisRecord.orientation & "," & Text(ThisRecord.height) &
              "," & If(ThisRecord.showValue,"Y","N") & ",N" & Char(10) &
              "^FD" & ThisRecord.content & "^FS" & Char(10),
            "UPCA",
              "^BU" & ThisRecord.orientation & "," & Text(ThisRecord.height) &
              "," & If(ThisRecord.showValue,"Y","N") & ",N,Y" & Char(10) &
              "^FD" & ThisRecord.content & "^FS" & Char(10),
            "BOX",
              "^GB" & Text(ThisRecord.width) & "," & Text(ThisRecord.height) & "," & Text(ThisRecord.thickness) & ",B,0" & Char(10) &
              "^FS" & Char(10),
            ""
          )
        ) & "^XZ";

      ZPLPrint =
        "^XA" & Char(10) &
        "^MMT" & Char(10) &
        "^PW" & Text(gblActivePrintTpl.LabelWidth) & Char(10) &
        "^LL" & Text(gblActivePrintTpl.LabelHeight) & Char(10) &
        "^LH0,0" & Char(10) &
        Concat(colPrintElems,
          "^FO" & Text(ThisRecord.x) & "," & Text(ThisRecord.y) & Char(10) &
          Switch(ThisRecord.type,
            "TEXT",
              "^A0" & ThisRecord.orientation & "," & Text(ThisRecord.fontH) & "," & Text(ThisRecord.fontW) & Char(10) &
              "^FB" & Text(ThisRecord.width) & ",1,0,L,0" & Char(10) &
              "^FD" & With({_vn: ThisRecord.variableName, _ct: ThisRecord.content, _iv: ThisRecord.isVariable},
                If(_iv,
                  Coalesce(LookUp(colPrintVals, varName = _vn, value), _ct),
                  _ct)) & "^FS" & Char(10),
            "CODE128",
              "^BY2,3," & Text(ThisRecord.height) & Char(10) &
              "^BC" & ThisRecord.orientation & "," & Text(ThisRecord.height) &
              "," & If(ThisRecord.showValue,"Y","N") & ",N,N" & Char(10) &
              "^FD" & With({_vn: ThisRecord.variableName, _ct: ThisRecord.content, _iv: ThisRecord.isVariable},
                If(_iv,
                  Coalesce(LookUp(colPrintVals, varName = _vn, value), _ct),
                  _ct)) & "^FS" & Char(10),
            "QRCODE",
              "^BQ" & ThisRecord.orientation & ",2," & Text(ThisRecord.magnification) & Char(10) &
              "^FDQA," & With({_vn: ThisRecord.variableName, _ct: ThisRecord.content, _iv: ThisRecord.isVariable},
                If(_iv,
                  Coalesce(LookUp(colPrintVals, varName = _vn, value), _ct),
                  _ct)) & "^FS" & Char(10),
            "EAN13",
              "^BE" & ThisRecord.orientation & "," & Text(ThisRecord.height) &
              "," & If(ThisRecord.showValue,"Y","N") & ",N" & Char(10) &
              "^FD" & With({_vn: ThisRecord.variableName, _ct: ThisRecord.content, _iv: ThisRecord.isVariable},
                If(_iv,
                  Coalesce(LookUp(colPrintVals, varName = _vn, value), _ct),
                  _ct)) & "^FS" & Char(10),
            "UPCA",
              "^BU" & ThisRecord.orientation & "," & Text(ThisRecord.height) &
              "," & If(ThisRecord.showValue,"Y","N") & ",N,Y" & Char(10) &
              "^FD" & With({_vn: ThisRecord.variableName, _ct: ThisRecord.content, _iv: ThisRecord.isVariable},
                If(_iv,
                  Coalesce(LookUp(colPrintVals, varName = _vn, value), _ct),
                  _ct)) & "^FS" & Char(10),
            "BOX",
              "^GB" & Text(ThisRecord.width) & "," & Text(ThisRecord.height) & "," & Text(ThisRecord.thickness) & ",B,0" & Char(10) &
              "^FS" & Char(10),
            ""
          )
        ) & "^XZ";

      CanvasHTML =
        // Generates the HTML label preview.
        // _seq: gblSeqTick is a dummy binding — never used in the body — but it registers
        // gblSeqTick as a formal dependency of this named formula. Without it, the named
        // formula engine has no reason to recalculate when gblSeqTick changes, so it
        // returns a stale cached result even though HtmlViewer re-renders via the appended
        // tick comment. With this binding, Set(gblSeqTick,...) in ▲/▼ OnSelect correctly
        // invalidates the cache → Sort(colElements, seq) re-runs → preview shows new order.
        With({lw: If(gblLabelWidth > 0, gblLabelWidth, 600), lh: If(gblLabelHeight > 0, gblLabelHeight, 400),
              _seq: gblSeqTick},
          With({sc: If(gblScaleMode = "100pct", 1.0,
                      If(gblScaleMode = "FixH",  Min(420 / lh, 2.0),
                      If(gblScaleMode = "FixW",  Min(820 / lw, 2.0),
                                                 Min(820 / lw, 420 / lh, 2.0)))) * gblScaleAdj},
            "<!DOCTYPE html><html><head><style>" &
            "html,body{margin:0;padding:20px;box-sizing:border-box;" &
            "background:radial-gradient(circle,#b0b8d8 1px,transparent 1px) 0 0/20px 20px,#f3f5fc;" &
            "display:flex;align-items:flex-start;justify-content:center;}" &
            "</style></head><body>" &
            "<div style='position:relative;width:" &
            Text(Round(lw * sc, 0)) &
            "px;height:" & Text(Round(lh * sc, 0)) &
            "px;background:#fff;border:1px solid #a8b4d8;" &
            "box-shadow:0 4px 20px rgba(30,40,80,.16);overflow:hidden;flex-shrink:0;'>" &
            Concat(Sort(colElements, seq, SortOrder.Ascending), // FIX: bare "seq" not "ThisRecord.seq"
              "<div style='position:absolute;" &
              "left:" & Text(Round(ThisRecord.x * sc, 0)) &
              "px;top:" & Text(Round(ThisRecord.y * sc, 0)) &
              "px;width:" & Text(Round(ThisRecord.width * sc, 0)) &
              "px;height:" & Text(Round(ThisRecord.height * sc, 0)) &
              "px;border:1.5px " &
              If(ThisRecord.id = gblSelectedElem.id, "solid #E07B00", "dashed rgba(90,110,200,.45)") &
              ";box-sizing:border-box;overflow:hidden;background:rgba(235,240,255,.50);'>" &
              Switch(ThisRecord.type,
                "TEXT",
                  "<span style='font-family:Courier New,monospace;font-size:" &
                  Text(Round(ThisRecord.fontH * sc * 0.72, 0)) &
                  "px;transform:scaleX(" &
                  Text(Round(If(ThisRecord.fontH > 0, ThisRecord.fontW / ThisRecord.fontH, 1), 3)) &
                  ");transform-origin:left top;white-space:nowrap;color:#000;display:block;text-align:left;line-height:1.2;'>" &
                  If(ThisRecord.isVariable, "{" & ThisRecord.variableName & "}", ThisRecord.content) & "</span>",
                "CODE128",
                  "<div style='background:repeating-linear-gradient(" &
                  "90deg,#000 0,#000 2px,#fff 2px,#fff 4px,#000 4px,#000 5px,#fff 5px,#fff 8px);" &
                  "height:" & If(ThisRecord.showValue,"78%","100%") & ";width:100%;'></div>" &
                  If(ThisRecord.showValue,
                    "<div style='font-size:8px;text-align:center;font-family:monospace;color:#000;'>" &
                    If(ThisRecord.isVariable, "{" & ThisRecord.variableName & "}", ThisRecord.content) & "</div>",
                    ""),
                "QRCODE",
                  "<img src='https://api.qrserver.com/v1/create-qr-code/?size=" &
                  Text(Round(ThisRecord.width * sc, 0)) & "x" & Text(Round(ThisRecord.height * sc, 0)) &
                  "&data=" & EncodeUrl(If(ThisRecord.isVariable, "{" & ThisRecord.variableName & "}", ThisRecord.content)) &
                  "&bgcolor=ffffff&color=000000&margin=2' " &
                  "style='width:100%;height:100%;object-fit:contain;display:block;' />",
                "EAN13",
                  "<div style='background:repeating-linear-gradient(" &
                  "90deg,#000 0,#000 2px,#fff 2px,#fff 5px);" &
                  "height:" & If(ThisRecord.showValue,"78%","100%") & ";'></div>" &
                  If(ThisRecord.showValue,
                    "<div style='font-size:8px;text-align:center;font-family:monospace;color:#000;'>" &
                    If(ThisRecord.isVariable, "{" & ThisRecord.variableName & "}", ThisRecord.content) & "</div>",
                    ""),
                "UPCA",
                  "<div style='background:repeating-linear-gradient(" &
                  "90deg,#000 0,#000 2px,#fff 2px,#fff 5px);" &
                  "height:" & If(ThisRecord.showValue,"78%","100%") & ";'></div>" &
                  If(ThisRecord.showValue,
                    "<div style='font-size:8px;text-align:center;font-family:monospace;color:#000;'>" &
                    If(ThisRecord.isVariable, "{" & ThisRecord.variableName & "}", ThisRecord.content) & "</div>",
                    ""),
                "BOX",
                  "<div style='border:" & Text(ThisRecord.thickness) &
                  "px solid #000;width:100%;height:100%;box-sizing:border-box;'></div>",
                ""
              ) &
              If(ThisRecord.isVariable && ThisRecord.variableName <> "",
                "<div style='position:absolute;top:-9px;right:0;background:#3B5BDB;color:#fff;" &
                "font-size:9px;font-weight:700;padding:1px 4px;border-radius:3px;white-space:nowrap;'>{" &
                ThisRecord.variableName & "}</div>",
                ""
              ) &
              "</div>"
            ) & "</div></body></html>"
          )
        )


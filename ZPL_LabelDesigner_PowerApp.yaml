        Variant: ManualLayout
        Properties:
          Visible: =gblMsg.text <> ""
          Height: =72
          Width: =660
          X: =(Parent.Width - Self.Width) / 2
          Y: =56
        Children:
        - Html_MsgText_P:
            Control: HtmlViewer@2.1.0
            Properties:
              HtmlText: |
                ="<div style='padding:14px 18px;border-radius:8px;font-family:Segoe UI,sans-serif;" &
                "font-size:14px;font-weight:500;display:flex;align-items:center;gap:10px;" &
                "box-shadow:0 4px 16px rgba(214,148,0,.25);border-top:3px solid #D69400;" &
                Switch(gblMsg.type,
                  "error",   "background:#fff0f0;border-left:5px solid #e53935;color:#b71c1c;",
                  "warning", "background:#fffde7;border-left:5px solid #D69400;color:#7a4f00;",
                  "success", "background:#f0fff4;border-left:5px solid #43a047;color:#1b5e20;",
                             "background:#fffbf0;border-left:5px solid #D69400;color:#7a4f00;"
                ) & "'>" &
                Switch(gblMsg.type,
                  "error",   "&#10060;&nbsp;",
                  "warning", "&#9888;&#65039;&nbsp;",
                  "success", "&#9989;&nbsp;",
                             "&#8505;&#65039;&nbsp;"
                ) &
                gblMsg.text & "</div>"
              Height: =Parent.Height
              Width: =Parent.Width - 48
              X: =0
              Y: =0
        - Btn_MsgClose_P:
            Control: Button@0.0.45
            Properties:
              BasePaletteColor: =RGBA(214,148,0,1)
              BorderColor: =RGBA(230,175,50,1)
              BorderStyle: =BorderStyle.Solid
              BorderThickness: =1
              BorderRadius: =20
              FontSize: =13
              FontWeight: =FontWeight.Bold
              Height: =32
              OnSelect: |
                =Set(gblMsg, {type: "", text: ""})
              Text: ="✕"
              Width: =32
              X: =Parent.Width - 36
              Y: =(Parent.Height - Self.Height) / 2

  # ─────────────────────────────────────────────────────────────────────────
  # SCAN & PRINT SCREEN  1366 × 768
  # Flow: scan / type Order# → lookup ZPL_PrintOrders → match SKU to template
  #       → auto-fill variables → navigate to PrintScreen with vars pre-loaded
  # ─────────────────────────────────────────────────────────────────────────
  ScanScreen:
    Properties:
      Fill: =RGBA(243,245,252,1)
      OnVisible: |
        =Set(gblMsg, {type: "", text: ""});
        Set(gblScanStatus, "idle");
        Set(gblScannedOrder, Blank());
        Set(gblMatchedScanTpl, Blank());
        ClearCollect(colScanVarMap, Filter([{varName:"",value:""}], false))
    Children:

    # ── Navigation bar ───────────────────────────────────────────────────
    - Rect_Nav_SC:
        Control: Rectangle
        Properties:
          TabIndex: =0
          AccessibleLabel: =If(gblLang="EN","Navigation bar","导航栏")
          Fill: =RGBA(20,22,38,1)
          Height: =48
          Width: =Parent.Width
          X: =0
          Y: =0

    - Lbl_Brand_SC:
        Control: Label
        Properties:
          TabIndex: =0
          Color: =RGBA(255,255,255,1)
          Font: =Font.'Segoe UI'
          FontWeight: =FontWeight.Bold
          FocusedBorderThickness: =2
          Height: =48
          Size: =15
          Text: ="ZPL Label Designer"
          Width: =260
          X: =14
          Y: =0

    - Btn_Nav_Home_SC:
        Control: Button@0.0.45
        Properties:
          BasePaletteColor: =RGBA(255, 185, 0, 1)
          AccessibleLabel: =If(gblLang="EN","Go to Home","前往首页")
          BorderStyle: =BorderStyle.None
          Font: =Font.'Segoe UI'
          Height: =48
          OnSelect: =Navigate(HomeScreen, ScreenTransition.Fade)
          Text: =If(gblLang="EN","Home","首页")
          Width: =90
          X: =272
          Y: =0

    - Btn_Nav_Dsgn_SC:
        Control: Button@0.0.45
        Properties:
          BasePaletteColor: =RGBA(255, 185, 0, 1)
          AccessibleLabel: =If(gblLang="EN","Go to Designer","前往设计器")
          BorderStyle: =BorderStyle.None
          Font: =Font.'Segoe UI'
          Height: =48
          OnSelect: =Navigate(DesignerScreen, ScreenTransition.Fade)
          Text: =If(gblLang="EN","Designer","设计器")
          Width: =110
          X: =368
          Y: =0

    - Btn_Nav_Lib_SC:
        Control: Button@0.0.45
        Properties:
          BasePaletteColor: =RGBA(255, 185, 0, 1)
          AccessibleLabel: =If(gblLang="EN","Go to Templates","前往模板库")
          BorderStyle: =BorderStyle.None
          Font: =Font.'Segoe UI'
          Height: =48
          OnSelect: =Navigate(LibraryScreen, ScreenTransition.Fade)
          Text: =If(gblLang="EN","Templates","模板库")
          Width: =110
          X: =484
          Y: =0

    - Btn_Nav_Print_SC:
        Control: Button@0.0.45
        Properties:
          BasePaletteColor: =RGBA(255, 185, 0, 1)
          AccessibleLabel: =If(gblLang="EN","Go to Print","前往打印")
          BorderStyle: =BorderStyle.None
          Font: =Font.'Segoe UI'
          Height: =48
          OnSelect: =Navigate(PrintScreen, ScreenTransition.Fade)
          Text: =If(gblLang="EN","Print","打印")
          Width: =90
          X: =600
          Y: =0

    - Btn_Lang_SC:
        Control: Button@0.0.45
        Properties:
          BasePaletteColor: =RGBA(255, 185, 0, 1)
          AccessibleLabel: =If(gblLang="EN","Switch to Chinese","切换为英文")
          BorderColor: =RGBA(255,255,255,0.4)
          BorderStyle: =BorderStyle.Solid
          BorderThickness: =1
          Font: =Font.'Segoe UI'
          Height: =32
          OnSelect: =If(gblLang="EN", Set(gblLang,"ZH"), Set(gblLang,"EN"))
          Text: =If(gblLang="EN","ZH Chinese","EN English")
          Width: =120
          X: =Parent.Width - 136
          Y: =8

    # ── Page title ───────────────────────────────────────────────────────
    - Lbl_ScanTitle:
        Control: Label
        Properties:
          TabIndex: =0
          Font: =Font.'Segoe UI'
          FontWeight: =FontWeight.Bold
          FocusedBorderThickness: =2
          Height: =36
          Size: =20
          Text: =If(gblLang="EN","Scan & Print","扫描打印")
          Width: =500
          X: =20
          Y: =58

    # ════════════════════════════════════════════════════════════════
    # LEFT PANEL  x=10  w=570  — Order lookup
    # ════════════════════════════════════════════════════════════════

    # ── Step 1: Camera scan (mobile) ────────────────────────────────
    - Lbl_ScanStep1:
        Control: Label
        Properties:
          TabIndex: =0
          Color: =RGBA(160,90,0,1)
          Font: =Font.'Segoe UI'
          FontWeight: =FontWeight.Bold
          FocusedBorderThickness: =2
          Height: =22
          Size: =11
          Text: =If(gblLang="EN","1  SCAN ORDER BARCODE","1  扫描订单条码")
          Width: =570
          X: =10
          Y: =104

    # BarcodeReader — camera-based scanning (mobile / tablet)
    # OnScan fires automatically when a barcode is decoded by the camera.
    # BarcodeReader2.Value holds the decoded string at that moment.
    - BarcodeReader2:
        Control: BarcodeReader@1.0.25
        Properties:
          TabIndex: =0
          BarcodeType: =BarcodeType.Any
          Height: =160
          OnScan: |
            =Set(gblScanStatus, "searching");
            Set(gblScannedOrder,
              LookUp(ZPL_PrintOrders, Title = BarcodeReader2.Value));
            If(!IsBlank(gblScannedOrder),
              Set(gblMatchedScanTpl,
                LookUp(ZPL_LabelTemplates, LinkedSKU = gblScannedOrder.SKU));
              If(!IsBlank(gblMatchedScanTpl),
                ClearCollect(colPrintElems,
                  ForAll(Table(ParseJSON(gblMatchedScanTpl.ElementsJSON)),
                    {id: "" & ThisRecord.Value.id,
                     type: "" & ThisRecord.Value.type,
                     x: Value(Text(ThisRecord.Value.x)),
                     y: Value(Text(ThisRecord.Value.y)),
                     width: Value(Text(ThisRecord.Value.width)),
                     height: Value(Text(ThisRecord.Value.height)),
                     orientation: "" & ThisRecord.Value.orientation,
                     content: "" & ThisRecord.Value.content,
                     isVariable: Boolean(ThisRecord.Value.isVariable),
                     variableName: "" & ThisRecord.Value.variableName,
                     fontH: Value(Text(ThisRecord.Value.fontH)),
                     fontW: Value(Text(ThisRecord.Value.fontW)),
                     thickness: Value(Text(ThisRecord.Value.thickness)),
                     magnification: Value(Text(ThisRecord.Value.magnification)),
                     showValue: Boolean(ThisRecord.Value.showValue)}));
                ClearCollect(colScanVarMap,
                  ForAll(
                    Filter(colPrintElems, isVariable && variableName <> ""),
                    {varName: variableName,
                     value: Switch(Lower(variableName),
                       "ordernum",    "" & gblScannedOrder.Title,
                       "order",       "" & gblScannedOrder.Title,
                       "orderno",     "" & gblScannedOrder.Title,
                       "sku",         "" & gblScannedOrder.SKU,
                       "productname", "" & gblScannedOrder.ProductName,
                       "product",     "" & gblScannedOrder.ProductName,
                       "description", "" & gblScannedOrder.ProductName,
                       "quantity",    Text(gblScannedOrder.Quantity),
                       "qty",         Text(gblScannedOrder.Quantity),
                       "lotnumber",   "" & gblScannedOrder.LotNumber,
                       "lot",         "" & gblScannedOrder.LotNumber,
                       "expirydate",  Text(gblScannedOrder.ExpiryDate, "yyyy-MM-dd"),
                       "expiry",      Text(gblScannedOrder.ExpiryDate, "yyyy-MM-dd"),
                       "expdate",     Text(gblScannedOrder.ExpiryDate, "yyyy-MM-dd"),
                       "customer",    "" & gblScannedOrder.Customer,
                       "")}));
                Set(gblScanStatus, "found"),
                Set(gblScanStatus, "no_template")),
              Set(gblScanStatus, "not_found"))
          Width: =280
          X: =10
          Y: =128

    # Divider between camera and USB/manual entry
    - Lbl_ScanOrDivider:
        Control: Label
        Properties:
          TabIndex: =0
          Align: =Align.Center
          Color: =RGBA(140,95,25,1)
          Font: =Font.'Segoe UI'
          FocusedBorderThickness: =2
          Height: =22
          Size: =11
          Text: =If(gblLang="EN","— or type / USB scanner below —","— 或使用以下文字输入 / USB 扫描枪 —")
          Width: =570
          X: =10
          Y: =293

    # ── Step 1b: USB scanner / manual entry ─────────────────────────
    # USB barcode scanner (keyboard-wedge): focuses here and presses Enter
    # to trigger Btn_ScanSearch. Manual users type and tap Search.
    - Lbl_ScanStep1b:
        Control: Label
        Properties:
          TabIndex: =0
          Color: =RGBA(160,90,0,1)
          Font: =Font.'Segoe UI'
          FontWeight: =FontWeight.Bold
          FocusedBorderThickness: =2
          Height: =20
          Size: =10
          Text: =If(gblLang="EN","USB scanner / manual entry","USB 扫描枪 / 手动输入")
          Width: =570
          X: =10
          Y: =319

    # TextInput — receives USB keyboard-wedge output or manual typing
    - TxtIn_ScanOrder:
        Control: ModernTextInput@1.0.0
        Properties:
          AccessibleLabel: =If(gblLang="EN","Order number — USB scanner or manual input","订单号 — USB 扫描枪或手动输入")
          BorderColor: =RGBA(214,148,0,0.6)
          BorderStyle: =BorderStyle.Solid
          BorderThickness: =2
          Font: =Font.'Segoe UI'
          Height: =40
          Width: =434
          X: =10
          Y: =341

    - Btn_ScanSearch:
        Control: Button@0.0.45
        Properties:
          BasePaletteColor: =RGBA(255, 185, 0, 1)
          AccessibleLabel: =If(gblLang="EN","Search order","查询订单")
          BorderStyle: =BorderStyle.None
          Font: =Font.'Segoe UI'
          FontWeight: =FontWeight.SemiBold
          Height: =40
          OnSelect: |
            =If(IsBlank(TxtIn_ScanOrder.Text) || Len(Trim(TxtIn_ScanOrder.Text)) = 0,
              Set(gblMsg, {type: "warning", text: If(gblLang="EN","Please enter an order number.","请输入订单号。")}),
              Set(gblScanStatus, "searching");
              Set(gblScannedOrder,
                LookUp(ZPL_PrintOrders, Title = Trim(TxtIn_ScanOrder.Text)));
              If(!IsBlank(gblScannedOrder),
                Set(gblMatchedScanTpl,
                  LookUp(ZPL_LabelTemplates, LinkedSKU = gblScannedOrder.SKU));
                If(!IsBlank(gblMatchedScanTpl),
                  ClearCollect(colPrintElems,
                    ForAll(Table(ParseJSON(gblMatchedScanTpl.ElementsJSON)),
                      {id: "" & ThisRecord.Value.id,
                       type: "" & ThisRecord.Value.type,
                       x: Value(Text(ThisRecord.Value.x)),
                       y: Value(Text(ThisRecord.Value.y)),
                       width: Value(Text(ThisRecord.Value.width)),
                       height: Value(Text(ThisRecord.Value.height)),
                       orientation: "" & ThisRecord.Value.orientation,
                       content: "" & ThisRecord.Value.content,
                       isVariable: Boolean(ThisRecord.Value.isVariable),
                       variableName: "" & ThisRecord.Value.variableName,
                       fontH: Value(Text(ThisRecord.Value.fontH)),
                       fontW: Value(Text(ThisRecord.Value.fontW)),
                       thickness: Value(Text(ThisRecord.Value.thickness)),
                       magnification: Value(Text(ThisRecord.Value.magnification)),
                       showValue: Boolean(ThisRecord.Value.showValue)}));
                  ClearCollect(colScanVarMap,
                    ForAll(
                      Filter(colPrintElems, isVariable && variableName <> ""),
                      {varName: variableName,
                       value: Switch(Lower(variableName),
                         "ordernum",    "" & gblScannedOrder.Title,
                         "order",       "" & gblScannedOrder.Title,
                         "orderno",     "" & gblScannedOrder.Title,
                         "sku",         "" & gblScannedOrder.SKU,
                         "productname", "" & gblScannedOrder.ProductName,
                         "product",     "" & gblScannedOrder.ProductName,
                         "description", "" & gblScannedOrder.ProductName,
                         "quantity",    Text(gblScannedOrder.Quantity),
                         "qty",         Text(gblScannedOrder.Quantity),
                         "lotnumber",   "" & gblScannedOrder.LotNumber,
                         "lot",         "" & gblScannedOrder.LotNumber,
                         "expirydate",  Text(gblScannedOrder.ExpiryDate, "yyyy-MM-dd"),
                         "expiry",      Text(gblScannedOrder.ExpiryDate, "yyyy-MM-dd"),
                         "expdate",     Text(gblScannedOrder.ExpiryDate, "yyyy-MM-dd"),
                         "customer",    "" & gblScannedOrder.Customer,
                         "")}));
                  Set(gblScanStatus, "found"),
                  Set(gblScanStatus, "no_template")),
                Set(gblScanStatus, "not_found")))
          Text: =If(gblLang="EN","Search","查询")
          Width: =126
          X: =450
          Y: =341

    # Status feedback label
    - Lbl_ScanStatus:
        Control: Label
        Properties:
          TabIndex: =0
          Color: =Switch(gblScanStatus,
            "found",       RGBA(30,130,30,1),
            "not_found",   RGBA(200,30,30,1),
            "no_template", RGBA(180,100,0,1),
            "searching",   RGBA(50,80,200,1),
            RGBA(130,100,60,1))
          Font: =Font.'Segoe UI'
          FontWeight: =FontWeight.SemiBold
          FocusedBorderThickness: =2
          Height: =26
          Size: =12
          Text: |
            =Switch(gblScanStatus,
              "idle",        "",
              "searching",   If(gblLang="EN","Searching…","正在查询…"),
              "found",       If(gblLang="EN",
                "Order found — template: " & gblMatchedScanTpl.Title,
                "订单已找到 — 模板：" & gblMatchedScanTpl.Title),
              "not_found",   If(gblLang="EN",
                "Order not found: " & TxtIn_ScanOrder.Text,
                "订单未找到：" & TxtIn_ScanOrder.Text),
              "no_template", If(gblLang="EN",
                "No template linked to SKU: " & gblScannedOrder.SKU,
                "SKU 未关联模板：" & gblScannedOrder.SKU),
              "")
          Width: =570
          X: =10
          Y: =386

    # ── Order info card (visible when order found) ────────────────────
    - Rect_OrderCard:
        Control: Rectangle
        Properties:
          TabIndex: =0
          AccessibleLabel: =If(gblLang="EN","Order card","订单卡片")
          BorderColor: =RGBA(230,175,50,1)
          BorderStyle: =BorderStyle.Solid
          BorderThickness: =1
          Fill: =RGBA(235,240,255,1)
          Height: =210
          Visible: =gblScanStatus = "found" || gblScanStatus = "no_template"
          Width: =570
          X: =10
          Y: =418

    - Lbl_OrdCard_Hdr:
        Control: Label
        Properties:
          TabIndex: =0
          Color: =RGBA(160,90,0,1)
          Font: =Font.'Segoe UI'
          FontWeight: =FontWeight.Bold
          FocusedBorderThickness: =2
          Height: =22
          Size: =11
          Text: =If(gblLang="EN","ORDER DETAILS","订单详情")
          Visible: =gblScanStatus = "found" || gblScanStatus = "no_template"
          Width: =570
          X: =10
          Y: =420

    - Lbl_OrdNum:
        Control: Label
        Properties:
          TabIndex: =0
          Color: =RGBA(15,8,0,1)
          Font: =Font.'Segoe UI'
          FocusedBorderThickness: =2
          Height: =24
          Size: =12
          Text: |
            =If(gblLang="EN","Order No: ","订单号：") & "" & gblScannedOrder.Title
          Visible: =gblScanStatus = "found" || gblScanStatus = "no_template"
          Width: =280
          X: =18
          Y: =444

    - Lbl_OrdSKU:
        Control: Label
        Properties:
          TabIndex: =0
          Color: =RGBA(15,8,0,1)
          Font: =Font.'Segoe UI'
          FocusedBorderThickness: =2
          Height: =24
          Size: =12
          Text: |
            ="SKU: " & "" & gblScannedOrder.SKU
          Visible: =gblScanStatus = "found" || gblScanStatus = "no_template"
          Width: =280
          X: =298
          Y: =444

    - Lbl_OrdProduct:
        Control: Label
        Properties:
          TabIndex: =0
          Color: =RGBA(15,8,0,1)
          Font: =Font.'Segoe UI'
          FocusedBorderThickness: =2
          Height: =24
          Size: =12
          Text: |
            =If(gblLang="EN","Product: ","产品：") & "" & gblScannedOrder.ProductName
          Visible: =gblScanStatus = "found" || gblScanStatus = "no_template"
          Width: =560
          X: =18
          Y: =470

    - Lbl_OrdQtyLot:
        Control: Label
        Properties:
          TabIndex: =0
          Color: =RGBA(15,8,0,1)
          Font: =Font.'Segoe UI'
          FocusedBorderThickness: =2
          Height: =24
          Size: =12
          Text: |
            =If(gblLang="EN","Qty: ","数量：") &
              Text(gblScannedOrder.Quantity) &
              If(gblLang="EN","   Lot: ","   批次：") &
              "" & gblScannedOrder.LotNumber
          Visible: =gblScanStatus = "found" || gblScanStatus = "no_template"
          Width: =560
          X: =18
          Y: =496

    - Lbl_OrdExpCust:
        Control: Label
        Properties:
          TabIndex: =0
          Color: =RGBA(15,8,0,1)
          Font: =Font.'Segoe UI'
          FocusedBorderThickness: =2
          Height: =24
          Size: =12
          Text: |
            =If(gblLang="EN","Expiry: ","到期：") &
              Text(gblScannedOrder.ExpiryDate, "yyyy-MM-dd") &
              If(gblLang="EN","   Customer: ","   客户：") &
              "" & gblScannedOrder.Customer
          Visible: =gblScanStatus = "found" || gblScanStatus = "no_template"
          Width: =560
          X: =18
          Y: =522

    # No-template warning message inside card
    - Lbl_NoTplWarn:
        Control: Label
        Properties:
          TabIndex: =0
          Color: =RGBA(180,80,0,1)
          Fill: =RGBA(255,240,200,1)
          Font: =Font.'Segoe UI'
          FontWeight: =FontWeight.SemiBold
          FocusedBorderThickness: =2
          Height: =60
          Size: =11
          Text: |
            =If(gblLang="EN",
              "No template linked to SKU: " & gblScannedOrder.SKU &
              " — open Templates library and set LinkedSKU on the desired template.",
              "SKU：" & gblScannedOrder.SKU &
              " 尚未关联标签模板，请在模板库中为目标模板设置 LinkedSKU 字段。")
          Visible: =gblScanStatus = "no_template"
          Width: =550
          X: =18
          Y: =556

    # ════════════════════════════════════════════════════════════════
    # RIGHT PANEL  x=600  w=756  — Variable mapping + Print button
    # ════════════════════════════════════════════════════════════════
    - Rect_ScanRightBg:
        Control: Rectangle
        Properties:
          TabIndex: =0
          AccessibleLabel: =If(gblLang="EN","Scan panel background","扫描面板背景")
          Fill: =RGBA(255,255,255,1)
          Height: =Parent.Height - 56
          Width: =Parent.Width - 610
          X: =600
          Y: =56

    - Lbl_ScanStep3:
        Control: Label
        Properties:
          TabIndex: =0
          Color: =RGBA(160,90,0,1)
          Font: =Font.'Segoe UI'
          FontWeight: =FontWeight.Bold
          FocusedBorderThickness: =2
          Height: =22
          Size: =11
          Text: =If(gblLang="EN","2  VARIABLE MAPPING  (edit before printing)","2  变量映射（打印前可修改）")
          Width: =Parent.Width - 620
          X: =610
          Y: =104

    - Lbl_ScanVarHint:
        Control: Label
        Properties:
          TabIndex: =0
          Color: =RGBA(140,95,25,1)
          Font: =Font.'Segoe UI'
          FocusedBorderThickness: =2
          Height: =18
          Size: =10
          Text: =If(gblLang="EN",
            "Values are auto-filled from order data — override any field before printing.",
            "变量值已从订单自动填充 — 打印前可覆盖任意字段。")
          Width: =Parent.Width - 620
          X: =610
          Y: =126

    # No variables message
    - Lbl_ScanNoVars:
        Control: Label
        Properties:
          TabIndex: =0
          Color: =RGBA(160,90,0,1)
          Font: =Font.'Segoe UI'
          FocusedBorderThickness: =2
          Height: =36
          Size: =12
          Text: =If(gblLang="EN",
            "No variable elements in this template — click Print directly.",
            "此模板无变量元素，直接点击打印即可。")
          Visible: =gblScanStatus = "found" && CountRows(colScanVarMap) = 0
          Width: =Parent.Width - 620
          X: =610
          Y: =152

    # Variable mapping gallery
    - Gal_ScanVars:
        Control: Gallery@2.15.0
        Variant: Vertical
        Properties:
          TabIndex: =0
          AccessibleLabel: =If(gblLang="EN","Variable values to fill","变量值填写")
          Height: =Parent.Height - 230
          Items: =colScanVarMap
          ShowScrollbar: =true
          TemplatePadding: =4
          TemplateSize: =66
          Visible: =gblScanStatus = "found" && CountRows(colScanVarMap) > 0
          Width: =Parent.Width - 620
          X: =610
          Y: =150

        Children:
        - Lbl_SVarName:
            Control: Label
            Properties:
              TabIndex: =0
              Color: =RGBA(160,90,0,1)
              Fill: =RGBA(0,0,0,0)
              Font: =Font.'Segoe UI'
              FontWeight: =FontWeight.Bold
              FocusedBorderThickness: =2
              Height: =22
              Size: =11
              Text: ="{" & ThisItem.varName & "}"
              Width: =200
              X: =0
              Y: =2

        - Lbl_SVarAuto:
            Control: Label
            Properties:
              TabIndex: =0
              Color: =RGBA(90,130,90,1)
              Fill: =RGBA(0,0,0,0)
              Font: =Font.'Segoe UI'
              FocusedBorderThickness: =2
              Height: =18
              Size: =10
              Text: =If(gblLang="EN",
                If(IsBlank(ThisItem.value) || ThisItem.value = "",
                  "⚠ no auto-match — fill manually",
                  "auto-filled"),
                If(IsBlank(ThisItem.value) || ThisItem.value = "",
                  "⚠ 未自动匹配，请手动填写",
                  "已自动填充"))
              Width: =200
              X: =202
              Y: =4

        - TxtIn_SVarVal:
            Control: ModernTextInput@1.0.0
            Properties:
              AccessibleLabel: =If(gblLang="EN",
                "Value for variable " & ThisItem.varName,
                ThisItem.varName & " 变量值")
              Height: =36
              OnChange: |
                =Patch(colScanVarMap,
                  LookUp(colScanVarMap, varName = ThisItem.varName),
                  {value: TxtIn_SVarVal.Text})
              Default: =ThisItem.value
              Width: =Parent.Width - 10
              X: =0
              Y: =26

    # ── Bottom action buttons ────────────────────────────────────────
    - Btn_ScanProceed:
        Control: Button@0.0.45
        Properties:
          BasePaletteColor: =RGBA(255, 185, 0, 1)
          AccessibleLabel: =If(gblLang="EN","Proceed to Print screen","前往打印界面")
          BorderStyle: =BorderStyle.None
          Font: =Font.'Segoe UI'
          FontWeight: =FontWeight.SemiBold
          Height: =48
          OnSelect: |
            =Set(gblActivePrintTpl, gblMatchedScanTpl);
            Set(gblPrintTplId, gblMatchedScanTpl.ID);
            ClearCollect(colPrintVals,
              ForAll(colScanVarMap, {varName: varName, value: value}));
            Set(gblFromScan, true);
            Navigate(PrintScreen, ScreenTransition.Fade)
          Text: =If(gblLang="EN","Proceed to Print  →","前往打印  →")
          Visible: =gblScanStatus = "found"
          Width: =Parent.Width - 710
          X: =610
          Y: =Parent.Height - 110

    - Btn_ScanReset:
        Control: Button@0.0.45
        Properties:
          BasePaletteColor: =RGBA(255, 185, 0, 1)
          AccessibleLabel: =If(gblLang="EN","Clear scan results","清除扫描结果")
          BorderColor: =RGBA(230,175,50,1)
          BorderStyle: =BorderStyle.Solid
          BorderThickness: =1
          Font: =Font.'Segoe UI'
          Height: =48
          OnSelect: |
            =Set(gblScanStatus, "idle");
            Set(gblScannedOrder, Blank());
            Set(gblMatchedScanTpl, Blank());
            ClearCollect(colScanVarMap, Filter([{varName:"",value:""}], false));
            Set(gblFromScan, false)
          Text: =If(gblLang="EN","Clear","清除")
          Width: =120
          X: =Parent.Width - 230
          Y: =Parent.Height - 110

    # ── Message Popup Overlay — Visible when gblMsg.text <> "" ──────────────
    - Con_MsgPopup_S:
        Control: GroupContainer@1.5.0

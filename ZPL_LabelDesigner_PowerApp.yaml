            Properties:
              HtmlText: |
                ="<div style='padding:14px 18px;border-radius:8px;font-family:Segoe UI,sans-serif;" &
                "font-size:14px;font-weight:500;display:flex;align-items:center;gap:10px;" &
                "box-shadow:0 4px 16px rgba(214,148,0,.25);border-top:3px solid #D69400;" &
                Switch(gblMsg.type,
                  "error",   "background:#fff0f0;border-left:5px solid #e53935;color:#b71c1c;",
                  "warning", "background:#fffde7;border-left:5px solid #D69400;color:#7a4f00;",
                  "success", "background:#f0fff4;border-left:5px solid #43a047;color:#1b5e20;",
                             "background:#fffbf0;border-left:5px solid #D69400;color:#7a4f00;"
                ) & "'>" &
                Switch(gblMsg.type,
                  "error",   "&#10060;&nbsp;",
                  "warning", "&#9888;&#65039;&nbsp;",
                  "success", "&#9989;&nbsp;",
                             "&#8505;&#65039;&nbsp;"
                ) &
                gblMsg.text & "</div>"
              Height: =Parent.Height
              Width: =Parent.Width - 48
              X: =0
              Y: =0
        - Btn_MsgClose_S:
            Control: Button@0.0.45
            Properties:
              BasePaletteColor: =RGBA(214,148,0,1)
              BorderColor: =RGBA(230,175,50,1)
              BorderStyle: =BorderStyle.Solid
              BorderThickness: =1
              BorderRadius: =20
              FontSize: =13
              FontWeight: =FontWeight.Bold
              Height: =32
              OnSelect: |
                =Set(gblMsg, {type: "", text: ""})
              Text: ="✕"
              Width: =32
              X: =Parent.Width - 36
              Y: =(Parent.Height - Self.Height) / 2



